<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stuart Harris · Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#eef4f3; --paper2:#e2ecec; --card:#fbfdfd; --card2:#eef4f3;
  --ink:#15302f; --ink-soft:#3f5957; --ink-faint:#6f8a88;
  --line:#d2e2e0; --line2:#b6cecb;
  /* --terra is the PRIMARY accent across the app: a deep teal, dialled up a touch */
  --terra:#0a8a96; --terra-deep:#055058; --terra-soft:#5cbcc3;
  /* --sage is the SECONDARY accent: a stronger forest green */
  --sage:#1f9b58; --sage-deep:#16723f; --gold:#0f9a80; --plum:#356fa0;
  --sky:#1f7bbf; --rose:#cb463c;
  --good:#1f9b58; --warn:#c8932f; --bad:#cb463c;
  --disp:'Libre Franklin',system-ui,sans-serif; --serif:'Libre Franklin',system-ui,sans-serif; --mono:'Spline Sans Mono',monospace;
  --shadow:0 1px 2px rgba(12,60,58,.05), 0 8px 24px rgba(14,90,95,.10);
  --shadow-lg:0 4px 12px rgba(12,60,58,.08), 0 20px 50px rgba(14,90,95,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--paper);color:var(--ink);font-family:var(--serif);font-size:16px;line-height:1.55;letter-spacing:.1px;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1200px 600px at 100% 0%, rgba(10,138,150,.17), transparent 55%),
    radial-gradient(900px 700px at 0% 100%, rgba(31,155,88,.15), transparent 52%),
    radial-gradient(700px 500px at 50% 120%, rgba(31,123,191,.09), transparent 60%);
  min-height:100vh;
}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:var(--paper)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px;border:3px solid var(--paper)}

.wrap{max-width:1200px;margin:0 auto;padding:0 28px 100px}

/* ---- top bar ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:26px 0 22px;gap:20px;flex-wrap:wrap}
.greet{display:flex;flex-direction:column;gap:2px}
.greet .hi{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:-.3px;line-height:1.05}
.greet .date{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);letter-spacing:.5px}
.top-actions{display:flex;gap:9px}
.btn{font-family:var(--serif);font-size:14px;cursor:pointer;border:1px solid var(--line2);
  background:var(--card);color:var(--ink-soft);padding:9px 15px;border-radius:11px;transition:.18s;
  display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--terra);color:var(--terra);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn.primary{background:var(--terra);border-color:var(--terra);color:#fff}
.btn.primary:hover{background:var(--terra-deep);color:#fff}
.btn svg{width:15px;height:15px}

/* ---- nav ---- */
.nav{display:flex;gap:6px;margin-bottom:30px;flex-wrap:wrap}
.nav button{font-family:var(--disp);font-weight:500;font-size:16px;color:var(--ink-faint);
  background:none;border:none;cursor:pointer;padding:9px 17px;border-radius:30px;transition:.18s;
  display:inline-flex;align-items:center;gap:8px}
.nav button .ic{width:17px;height:17px;opacity:.65}
.nav button:hover{color:var(--ink-soft);background:var(--paper2)}
.nav button.active{color:#fff;background:linear-gradient(135deg,var(--terra),var(--sage-deep));box-shadow:0 4px 14px rgba(14,90,95,.28)}
.nav button.active .ic{opacity:1}

/* ---- cards ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);position:relative}
.card-pad{padding:24px 26px}
.kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint)}
.h-sec{font-family:var(--disp);font-weight:700;font-size:23px;letter-spacing:-.3px;margin:6px 0 18px;display:flex;align-items:baseline;gap:12px}
.h-sec .sub{font-family:var(--serif);font-size:14px;color:var(--ink-faint);font-style:italic;letter-spacing:0}

.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}

.pane{display:none}
.pane.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---- stat tiles ---- */
.tile{padding:20px 22px}
.tile .lbl{font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-faint)}
.tile .num{font-family:var(--disp);font-weight:700;font-size:33px;letter-spacing:-.6px;margin-top:9px;line-height:1}
.tile .num small{font-size:16px;color:var(--ink-faint);font-weight:500}
.tile .foot{font-family:var(--serif);font-size:13px;color:var(--ink-soft);margin-top:8px;font-style:italic}
.accent-bar{height:3px;border-radius:3px;margin-bottom:16px;width:38px}

.coach{background:linear-gradient(135deg,var(--card),var(--card));border-left:3px solid var(--terra);
  padding:18px 22px;border-radius:0 14px 14px 0;margin-bottom:22px}
.coach .q{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--terra);margin-bottom:7px}
.coach p{font-family:var(--serif);font-size:15.5px;line-height:1.6;color:var(--ink-soft)}
.coach p b{color:var(--ink);font-weight:600}

/* progress ring + bars */
.ring-wrap{display:flex;align-items:center;gap:24px}
.donut{display:flex;flex-direction:column;gap:9px}
.dlin{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:14px}
.dot{width:11px;height:11px;border-radius:3px;flex:none}
.dlin .v{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--ink-soft)}

table.clean{width:100%;border-collapse:collapse;font-family:var(--serif);font-size:14.5px}
table.clean th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;
  color:var(--ink-faint);padding:9px 12px;border-bottom:1.5px solid var(--line2);font-weight:400}
table.clean th.r,table.clean td.r{text-align:right}
table.clean td{padding:11px 12px;border-bottom:1px solid var(--line)}
table.clean tr:last-child td{border-bottom:none}
table.clean tr:hover td{background:var(--paper2)}
.mono{font-family:var(--mono);font-size:13px}

/* sliders */
.slider-row{margin-bottom:18px}
.slider-row label{display:flex;justify-content:space-between;font-family:var(--serif);font-size:14px;color:var(--ink-soft);margin-bottom:8px}
.slider-row label b{font-family:var(--mono);font-size:13px;color:var(--terra);font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:5px;background:var(--line2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--terra);cursor:pointer;border:3px solid var(--card);box-shadow:0 2px 7px rgba(14,90,95,.45)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--terra);cursor:pointer;border:3px solid var(--card)}

.big-income{text-align:center;padding:30px 20px}
.big-income .pre{font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:15px}
.big-income .amt{font-family:var(--disp);font-weight:700;font-size:56px;letter-spacing:-1.5px;color:var(--terra-deep);line-height:1;margin:8px 0}
.big-income .post{font-family:var(--mono);font-size:12px;color:var(--ink-faint);letter-spacing:.5px}

/* chart */
.chart-box{width:100%}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;font-family:var(--serif);font-size:13px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:7px}

/* health markers */
.marker-card{padding:18px 20px;cursor:default}
.marker-card .mk-name{font-family:var(--disp);font-weight:600;font-size:18px}
.marker-card .mk-range{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:2px}
.marker-card .mk-latest{display:flex;align-items:baseline;gap:8px;margin:14px 0 4px}
.marker-card .mk-val{font-family:var(--disp);font-weight:700;font-size:29px;letter-spacing:-.6px}
.status-pill{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px}

/* drop zone */
.dz{border:2px dashed var(--line2);border-radius:14px;padding:34px 20px;text-align:center;cursor:pointer;transition:.18s}
.dz:hover{border-color:var(--terra);background:rgba(14,124,134,.05)}
.dz .dz-t{font-family:var(--disp);font-weight:600;font-size:17px}
.dz .dz-s{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-faint);margin-top:6px}
.sw-strip{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px}
.sw-strip img{height:84px;border-radius:7px;border:1px solid var(--line2);flex:none}
.sw-chat{display:flex;flex-direction:column;gap:12px;max-height:46vh;overflow-y:auto;padding:4px 2px 6px}
.sw-saved{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
.sw-saved:hover{border-color:var(--terra)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(44,38,34,.55);backdrop-filter:blur(5px);z-index:60;
  display:none;align-items:flex-start;justify-content:center;padding:44px 20px;overflow-y:auto}
.overlay.show{display:flex;animation:fade .25s}
.modal{background:var(--card);border:1px solid var(--line2);border-radius:20px;width:100%;max-width:760px;
  box-shadow:var(--shadow-lg);animation:rise .3s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:24px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.modal-head h2{font-family:var(--disp);font-weight:600;font-size:24px;letter-spacing:-.4px}
.modal-head .ms{font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:14px;margin-top:3px}
.modal-body{padding:24px 28px}
.x{cursor:pointer;border:none;background:none;color:var(--ink-faint);padding:4px;line-height:0}
.x:hover{color:var(--terra)}
.field{margin-bottom:15px}
.field label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--paper);border:1px solid var(--line2);border-radius:10px;
  padding:11px 13px;font-family:var(--serif);font-size:15px;color:var(--ink);transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--terra);box-shadow:0 0 0 3px rgba(14,124,134,.16)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);z-index:100;
  background:var(--ink);color:var(--paper);padding:13px 24px;border-radius:12px;font-family:var(--serif);font-size:14px;
  box-shadow:var(--shadow-lg);transition:.3s;opacity:0}
.toast.show{transform:translateX(-50%);opacity:1}
.empty{text-align:center;padding:46px 20px;color:var(--ink-faint);font-family:var(--serif);font-style:italic}

@media(max-width:860px){
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}
  .ring-wrap{flex-direction:column;align-items:flex-start}
  .wrap{padding:0 18px 90px}
}
/* Phones */
@media(max-width:560px){
  .wrap{padding:0 13px 80px}
  .topbar{padding:18px 0 16px;gap:12px}
  .greet .hi{font-size:22px}
  .g4{grid-template-columns:1fr 1fr;gap:12px}
  .row2,.row3{grid-template-columns:1fr}
  .tile{padding:15px 16px}
  .tile .num{font-size:27px}
  .tile .lbl{font-size:9px;letter-spacing:1px}
  .tile .foot{font-size:12px}
  .h-sec{font-size:19px}
  .card-pad{padding:18px 16px}
  /* nav becomes a horizontal scroll strip so buttons never crush */
  .nav{flex-wrap:nowrap;overflow-x:auto;gap:6px;margin-bottom:22px;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
  .nav::-webkit-scrollbar{display:none}
  .nav button{flex:0 0 auto;font-size:14px;padding:9px 13px}
  .nav button .ic{width:15px;height:15px}
  /* any table sitting in a card scrolls horizontally instead of overflowing */
  .card .scroll-x,.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.clean{font-size:13px;min-width:520px}
  table.clean th,table.clean td{padding:9px 9px}
  /* modal goes near-fullscreen for room */
  .modal{max-width:100%;border-radius:16px}
  .modal-head{padding:18px 18px}
  .modal-head h2{font-size:20px}
  .modal-body{padding:18px 16px}
  .club-detail-stats{grid-template-columns:repeat(2,1fr)!important}
  .big-income .amt{font-size:42px}
  .tk-grid{grid-template-columns:1fr!important}
  .daily-close-grid{grid-template-columns:1fr!important}
  .hero-stats{grid-template-columns:1fr 1fr!important}
}

/* ---- tasks / projects module ---- */
.tk-over{display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:center}
@media(max-width:760px){.tk-over{grid-template-columns:1fr;gap:18px}}
.tk-ring-num{font-family:var(--disp);font-weight:700;font-size:21px;fill:var(--ink)}
.tk-metrics{display:flex;gap:30px;flex-wrap:wrap}
.tk-metric .v{font-family:var(--disp);font-weight:700;font-size:27px;line-height:1;letter-spacing:-.5px}
.tk-metric .l{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-faint);margin-top:5px}
.tk-wkbars{display:flex;align-items:flex-end;gap:6px;height:46px}
.tk-wkcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.tk-wkcol .bar{width:100%;min-height:3px;background:var(--terra-soft);border-radius:4px 4px 2px 2px;transition:.35s}
.tk-wkcol .bar.today{background:var(--terra)}
.tk-wkcol .d{font-family:var(--mono);font-size:8.5px;color:var(--ink-faint)}
.tk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:18px}
.tk-proj{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 18px 12px;box-shadow:var(--shadow);display:flex;flex-direction:column}
.tk-proj-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.tk-proj-name{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
.tk-pdot{width:11px;height:11px;border-radius:4px;flex:none}
.tk-gear{cursor:pointer;color:var(--ink-faint);opacity:.55;transition:.15s;flex:none}
.tk-gear:hover{opacity:1;color:var(--terra)}
.tk-goal{font-family:var(--serif);font-size:12.5px;color:var(--ink-soft);font-style:italic}
.tk-goal b{font-style:normal;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.tk-bar{height:6px;border-radius:6px;background:var(--line2);overflow:hidden;margin:8px 0 4px}
.tk-bar>i{display:block;height:100%;border-radius:6px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.tk-list{margin-top:6px}
.tk-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.tk-item:last-child{border-bottom:none}
.tk-check{width:20px;height:20px;border-radius:7px;border:2px solid var(--line2);flex:none;display:grid;place-items:center;cursor:pointer;transition:.15s}
.tk-check:hover{border-color:var(--terra)}
.tk-check.on{background:var(--good);border-color:var(--good)}
.tk-txt{font-family:var(--serif);font-size:14.5px;flex:1;cursor:pointer;line-height:1.35}
.tk-txt.done{text-decoration:line-through;color:var(--ink-faint)}
.tk-flag{width:13px;height:13px;flex:none;cursor:pointer;border-radius:3px;border:1.5px solid transparent}
.tk-due{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;flex:none}
.tk-duecol{position:relative;font-family:var(--mono);font-size:10.5px;border:1px dashed var(--line);border-radius:7px;padding:3px 8px;min-width:60px;text-align:center;white-space:nowrap;flex:none;cursor:pointer;color:var(--ink-faint)}
.tk-duecol.set{border-style:solid}
.tk-duecol input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;border:0;padding:0;margin:0}
.tk-x{cursor:pointer;color:var(--line2);font-size:18px;line-height:1;padding:0 2px;flex:none}
.tk-x:hover{color:var(--rose)}
.tk-add{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:12px}
.tk-add input{flex:1;background:var(--paper);border:1px solid var(--line2);border-radius:9px;padding:8px 11px;font-family:var(--serif);font-size:13.5px;color:var(--ink)}
.tk-add input:focus{outline:none;border-color:var(--terra);box-shadow:0 0 0 3px rgba(14,124,134,.14)}
.tk-add button{flex:none;width:34px;height:34px;border-radius:9px;border:none;background:var(--terra);color:#fff;font-size:20px;line-height:1;cursor:pointer;transition:.15s}
.tk-add button:hover{background:var(--terra-deep)}
.tk-newproj{border:2px dashed var(--line2);border-radius:16px;display:grid;place-items:center;min-height:130px;cursor:pointer;color:var(--ink-faint);font-family:var(--disp);font-weight:600;font-size:15px;transition:.18s;text-align:center}
.tk-newproj:hover{border-color:var(--terra);color:var(--terra);background:rgba(14,124,134,.04)}
.tk-focus{display:flex;gap:8px;flex-wrap:wrap}
.tk-fchip{font-family:var(--serif);font-size:12.5px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 12px;display:inline-flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
.tk-fchip .fdot{width:8px;height:8px;border-radius:3px;flex:none}
.tk-done-head{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);margin:12px 0 2px;cursor:pointer;user-select:none}

/* ---- segmented control (Finance sub-nav) ---- */
.seg{display:inline-flex;background:var(--paper2);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px;margin-bottom:22px}
.seg-btn{font-family:var(--disp);font-weight:600;font-size:14.5px;color:var(--ink-faint);background:none;border:none;cursor:pointer;padding:9px 20px;border-radius:10px;transition:.18s}
.seg-btn:hover{color:var(--ink-soft)}
.seg-btn.active{background:var(--card);color:var(--terra-deep);box-shadow:var(--shadow)}
.cf-in{font-family:var(--mono);font-size:13px;border:1px solid var(--line);border-radius:7px;padding:7px 9px;background:var(--paper);color:var(--ink);width:130px;text-align:right}
.cf-in:focus{outline:none;border-color:var(--terra)}
.cf-name{font-family:var(--serif);font-size:14px;border:1px solid transparent;border-radius:7px;padding:7px 9px;background:transparent;color:var(--ink);flex:1;min-width:120px;text-align:left}
.cf-name:hover{border-color:var(--line)}
.cf-name:focus{outline:none;border-color:var(--terra);background:var(--paper)}
.cf-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.cf-x{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:15px;padding:4px 7px;border-radius:6px;line-height:1}
.cf-x:hover{color:var(--bad);background:var(--paper2)}
.cf-add{font-family:var(--mono);font-size:11px;color:var(--terra);cursor:pointer;background:none;border:none;padding:6px 0}
.cf-add:hover{text-decoration:underline}
.c-green{color:var(--good)!important}
.c-red{color:var(--bad)!important}
.as-ref-col,.as-user-col{flex:1;min-width:160px}
.as-panel-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px}

/* ---- Coach chat drawer (Claude life coach) ---- */
.coach-fab{position:fixed;right:26px;bottom:26px;z-index:70;display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--terra),var(--sage-deep));color:#fff;border:none;cursor:pointer;
  padding:14px 20px;border-radius:30px;font-family:var(--disp);font-weight:600;font-size:15px;
  box-shadow:0 6px 20px rgba(10,90,95,.4);transition:.2s}
.coach-fab:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(10,90,95,.5)}
.coach-fab svg{width:19px;height:19px}
.coach-drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;z-index:80;
  background:var(--card);border-left:1px solid var(--line2);box-shadow:-12px 0 40px rgba(12,60,58,.18);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s cubic-bezier(.2,.8,.2,1)}
.coach-drawer.open{transform:none}
.coach-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.coach-avatar{width:38px;height:38px;border-radius:12px;flex:none;display:grid;place-items:center;color:#fff;
  background:linear-gradient(135deg,var(--terra),var(--sage-deep))}
.coach-head h3{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:-.2px}
.coach-head .sub{font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--ink-faint);margin-top:1px}
.coach-msgs{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}
.cm{max-width:86%;padding:11px 14px;border-radius:15px;font-family:var(--serif);font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.cm.user{align-self:flex-end;background:var(--terra);color:#fff;border-bottom-right-radius:5px}
.cm.bot{align-self:flex-start;background:var(--paper2);color:var(--ink);border-bottom-left-radius:5px}
.cm.bot b{color:var(--terra-deep)}
.cm-typing{align-self:flex-start;color:var(--ink-faint);font-family:var(--serif);font-style:italic;font-size:13.5px}
.coach-sugg{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 12px}
.coach-sugg button{font-family:var(--serif);font-size:12.5px;background:var(--card);border:1px solid var(--line2);color:var(--ink-soft);border-radius:18px;padding:7px 12px;cursor:pointer;transition:.15s;text-align:left}
.coach-sugg button:hover{border-color:var(--terra);color:var(--terra)}
.coach-input{border-top:1px solid var(--line);padding:14px 16px;display:flex;gap:10px;align-items:flex-end}
.coach-input textarea{flex:1;resize:none;max-height:120px;background:var(--paper);border:1px solid var(--line2);border-radius:12px;
  padding:11px 13px;font-family:var(--serif);font-size:14.5px;color:var(--ink);line-height:1.4}
.coach-input textarea:focus{outline:none;border-color:var(--terra);box-shadow:0 0 0 3px rgba(10,138,150,.16)}
.coach-send{flex:none;width:42px;height:42px;border-radius:12px;border:none;background:var(--terra);color:#fff;cursor:pointer;display:grid;place-items:center;transition:.15s}
.coach-send:hover{background:var(--terra-deep)}
.coach-send:disabled{opacity:.5;cursor:default}
.coach-backdrop{position:fixed;inset:0;background:rgba(20,40,40,.28);backdrop-filter:blur(2px);z-index:75;display:none}
.coach-backdrop.show{display:block}
.daily-close-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){ .coach-fab{right:16px;bottom:16px;padding:13px 17px} .coach-drawer{width:100vw} }

/* ---- Goals (screen-privacy gated) ---- */
.lock-wrap{max-width:420px;margin:40px auto;text-align:center}
.lock-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:38px 30px}
.lock-ic{width:54px;height:54px;border-radius:16px;margin:0 auto 18px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--terra),var(--sage-deep))}
.lock-card h2{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:-.3px;margin-bottom:6px}
.lock-card p{font-family:var(--serif);font-size:13.5px;color:var(--ink-faint);line-height:1.5;margin-bottom:20px}
.lock-card input{width:100%;background:var(--paper);border:1px solid var(--line2);border-radius:12px;padding:13px 15px;font-family:var(--serif);font-size:16px;color:var(--ink);text-align:center;letter-spacing:2px;margin-bottom:14px}
.lock-card input:focus{outline:none;border-color:var(--terra);box-shadow:0 0 0 3px rgba(10,138,150,.16)}
.lock-note{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:16px;letter-spacing:.3px}
.goal-card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px 22px;display:flex;flex-direction:column;gap:10px}
.goal-cat{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;padding:4px 10px;border-radius:20px;align-self:flex-start}
.goal-title{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.2px;line-height:1.2}
.goal-meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
.goal-notes{font-family:var(--serif);font-size:13.5px;color:var(--ink-soft);line-height:1.5}
.goal-bar{height:8px;border-radius:8px;background:var(--line2);overflow:hidden}
.goal-bar>i{display:block;height:100%;border-radius:8px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.goal-actions{display:flex;gap:14px;margin-top:2px}
.goal-actions a{font-family:var(--serif);font-size:12.5px;color:var(--ink-faint);cursor:pointer}
.goal-actions a:hover{color:var(--terra)}

/* ---- stronger landing hero ---- */
.hero{position:relative;overflow:hidden;border-radius:22px;padding:30px 32px;margin-bottom:20px;
  background:linear-gradient(135deg,var(--terra-deep),var(--sage-deep) 92%);color:#fff;
  box-shadow:0 10px 34px rgba(10,80,88,.30)}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%)}
.hero .h-hi{font-family:var(--disp);font-weight:800;font-size:30px;letter-spacing:-.6px;line-height:1.05;position:relative}
.hero .h-date{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;opacity:.85;margin-top:6px;position:relative;text-transform:uppercase}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;position:relative;margin-top:22px}
.hero-stat{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:13px 15px;backdrop-filter:blur(4px)}
.hero-stat .v{font-family:var(--disp);font-weight:700;font-size:23px;letter-spacing:-.4px;line-height:1}
.hero-stat .l{font-family:var(--mono);font-size:9px;letter-spacing:1.1px;text-transform:uppercase;opacity:.82;margin-top:6px}
@media(max-width:760px){ .hero-stats{grid-template-columns:repeat(2,1fr)} .hero{padding:24px 22px} .hero .h-hi{font-size:25px} }
@media(max-width:560px){ .hero-stats{grid-template-columns:1fr 1fr;gap:10px} }

/* ---- bolder Tasks module ---- */
#pane-home .tk-over + .coach + .tk-grid{margin-top:20px}
.tk-proj{border-top-width:4px;padding-top:16px;transition:transform .15s,box-shadow .15s}
.tk-proj:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.tk-proj-name{font-size:19px;font-weight:800}
.tk-pdot{width:13px;height:13px;border-radius:5px}
.tk-metric .v{font-weight:800;font-size:30px}
.tk-ring-num{font-weight:800}
.tk-bar{height:8px}
.tk-check{width:22px;height:22px;border-width:2.5px}
.tk-txt{font-size:15px}
.tk-add input{font-size:14px}
.tk-add button{width:36px;height:36px;font-size:22px}
.tk-fchip{font-weight:600;border-width:1.5px}
.tk-newproj{border-width:2.5px;font-size:16px}

/* ---- Coach memory panel ---- */
.coach-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);flex-shrink:0}
.coach-tab{font-family:var(--disp);font-size:12px;font-weight:600;color:var(--ink-faint);background:none;border:none;cursor:pointer;padding:10px 16px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;flex:1;text-align:center}
.coach-tab:hover{color:var(--ink-soft)}
.coach-tab.active{color:var(--terra-deep);border-bottom-color:var(--terra-deep)}
.mem-panel{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.mem-section{background:var(--paper);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.mem-section-head{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);padding:9px 13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.mem-section-head button{font-family:var(--serif);font-size:11px;color:var(--terra);background:none;border:none;cursor:pointer;padding:0;letter-spacing:0;text-transform:none}
.mem-textarea{width:100%;background:none;border:none;padding:11px 13px;font-family:var(--serif);font-size:13.5px;color:var(--ink);line-height:1.55;resize:none;min-height:80px;outline:none}
.mem-textarea:focus{background:rgba(10,138,150,.03)}
.mem-log-item{padding:10px 13px;border-bottom:1px solid var(--line);font-family:var(--serif);font-size:12.5px;color:var(--ink-soft);line-height:1.5}
.mem-log-item:last-child{border-bottom:none}
.mem-log-date{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);margin-bottom:3px}
.mem-log-del{float:right;background:none;border:none;cursor:pointer;color:var(--line2);font-size:14px;line-height:1;padding:0 2px}
.mem-log-del:hover{color:var(--rose)}
.mem-actions{padding:10px 13px;display:flex;gap:8px;border-top:1px solid var(--line);flex-shrink:0}
</style>
</head>

const KEY = 'sh_life_v1';
let DB = (()=>{ try{const r=localStorage.getItem(KEY); if(r)return JSON.parse(r);}catch(e){} return JSON.parse(JSON.stringify(SEED)); })();

// ---- CROSS-DEVICE SYNC ----
// Every save() stamps DB._savedAt and pushes the blob to the proxy.
// On startup / refocus / every 5 min, devices pull and adopt the server copy
// if it's newer (last write wins). Golf rounds/shots, tasks, projects and
// manual calendar entries are UNION-merged so nothing is ever lost either way.
function _mergeLost(into, from){
  if(!from||typeof from!=='object') return;
  // golf rounds by id, shots by signature
  into.golf=into.golf||{shots:[],rounds:[]};
  const fg=from.golf||{};
  const haveR=new Set((into.golf.rounds||[]).map(r=>r&&r.id));
  (fg.rounds||[]).forEach(r=>{ if(r&&r.id&&!haveR.has(r.id)){ into.golf.rounds=into.golf.rounds||[]; into.golf.rounds.push(r); } });
  const sig=s=>[s.club,s.date,s.carry,s.ballSpeed].join('|');
  const haveS=new Set((into.golf.shots||[]).map(sig));
  (fg.shots||[]).forEach(s=>{ if(s&&!haveS.has(sig(s))){ into.golf.shots=into.golf.shots||[]; into.golf.shots.push(s); } });
  // tasks + projects by id (under morning)
  into.morning=into.morning||{}; const fm=from.morning||{};
  const haveT=new Set((into.morning.tasks||[]).map(t=>t&&t.id));
  (fm.tasks||[]).forEach(t=>{ if(t&&t.id&&!haveT.has(t.id)){ into.morning.tasks=into.morning.tasks||[]; into.morning.tasks.push(t); } });
  const haveP=new Set((into.morning.projects||[]).map(p=>p&&p.id));
  (fm.projects||[]).forEach(p=>{ if(p&&p.id&&!haveP.has(p.id)){ into.morning.projects=into.morning.projects||[]; into.morning.projects.push(p); } });
  // today's manual calendar entries by time+title
  const haveC=new Set((into.morning.calendar||[]).map(e=>e&&((e.time||'')+'|'+(e.title||''))));
  (fm.calendar||[]).forEach(e=>{ if(e&&e._manual&&!haveC.has((e.time||'')+'|'+(e.title||''))){ into.morning.calendar=into.morning.calendar||[]; into.morning.calendar.push(e); } });
}
let _lastPull=0;
async function pullFromServer(){
  const base=proxyBase(); if(!base) return;
  _lastPull=Date.now();
  try{
    const r=await fetch(base+'/userdata'); if(!r.ok) return;
    const server=await r.json(); if(!server||typeof server!=='object'||!Object.keys(server).length) return;
    const localIsDefault=!localStorage.getItem(KEY);
    const sAt=Date.parse(server._savedAt||0)||0, lAt=Date.parse(DB._savedAt||0)||0;
    // legacy fallback (neither copy stamped yet): old rule — server wins if it has more rounds
    const legacyAdopt = !sAt && !lAt && (((server.golf||{}).rounds||[]).length > ((DB.golf||{}).rounds||[]).length);
    if(localIsDefault || sAt>lAt || legacyAdopt){
      const localCopy=DB; DB=server; _mergeLost(DB, localCopy);
      try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){}
      console.log('[SYNC] adopted server copy ('+(server._savedAt||'unstamped')+')');
      if(typeof renderAll==='function') renderAll();
    } else if(lAt>sAt){
      _mergeLost(DB, server);
      console.log('[SYNC] local copy newer — pushing to server');
      save();
    }
  }catch(e){ console.log('[SYNC] pull failed', e.message); }
}
pullFromServer(); // startup
// Re-pull when the app regains focus (key for mobile, where tabs live for days) and periodically
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible' && Date.now()-_lastPull>60000) pullFromServer(); });
setInterval(()=>{ if(document.visibilityState==='visible') pullFromServer(); }, 5*60*1000);
/* Merge in any newly pre-loaded seed data this saved copy is missing, without
   overwriting the user's own entries. Keyed by content so re-runs are safe. */
(function mergeSeed(){
  let changed=false;
  DB.golf=DB.golf||{shots:[],rounds:[]};
  const sig=s=>[s.club,s.date,s.carry,s.ballSpeed].join('|');
  const have=new Set((DB.golf.shots||[]).map(sig));
  (SEED.golf&&SEED.golf.shots||[]).forEach(s=>{ if(!have.has(sig(s))){ DB.golf.shots.push(s); changed=true; } });
  if(changed){ try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} }
})();
function save(){
  DB._savedAt=new Date().toISOString();
  try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){ toast('Storage unavailable'); }
  // Push to server (non-blocking) so data survives across devices
  const base=proxyBase();
  if(base){ fetch(base+'/userdata',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)})
    .then(r=>{ if(!r.ok) console.log('[SYNC] push failed HTTP '+r.status); })
    .catch(e=>console.log('[SYNC] push failed', e.message)); }
}

/* Durable connection store — kept SEPARATE from the main data so a data
   reset/restore never loses your proxy URL. This is what makes the WHOOP +
   morning-report connection survive across sessions and Restore operations. */
const CONN_KEY='sh_life_conn_v1';
function loadConn(){ try{const r=localStorage.getItem(CONN_KEY); if(r)return JSON.parse(r);}catch(e){} return {proxyUrl:''}; }
function saveConn(c){ try{localStorage.setItem(CONN_KEY,JSON.stringify(c));}catch(e){} }
(function reconcileConn(){
  const c=loadConn();
  // If the dashboard is being SERVED FROM a real host (Railway etc.), adopt that
  // origin as the proxy automatically and persist it — so the connect box never shows.
  try{
    if(location && /^https?:/.test(location.protocol) && location.hostname &&
       !/^(localhost|127\.|0\.0\.0\.0)/.test(location.hostname) && location.protocol!=='file:'){
      const origin=location.origin.replace(/\/$/,'');
      c.proxyUrl=origin; saveConn(c);
    }
  }catch(e){}
  // Migration: if DB had a proxyUrl but durable store didn't, copy it across.
  if(DB.whoop&&DB.whoop.proxyUrl&&!c.proxyUrl){ c.proxyUrl=DB.whoop.proxyUrl; saveConn(c); }
  // Always mirror the durable URL back into DB.whoop so the rest of the app sees it.
  if(c.proxyUrl){ DB.whoop=DB.whoop||{}; DB.whoop.proxyUrl=c.proxyUrl; }
})();

const ZAR = (n,dec=0)=> 'R'+(n==null?'—':(+n).toLocaleString('en-ZA',{minimumFractionDigits:dec,maximumFractionDigits:dec}));

/* ============ SVG CHART HELPERS ============ */
function lineChart(series, opts={}){
  // series: [{name,color,points:[{x,y}]}], x numeric
  const W=opts.w||760, H=opts.h||260, pad={l:46,r:18,t:18,b:34};
  const all=series.flatMap(s=>s.points);
  if(!all.length) return '<div class="empty">No data yet</div>';
  const xs=all.map(p=>p.x), ys=all.map(p=>p.y);
  let minX=Math.min(...xs), maxX=Math.max(...xs);
  let minY=opts.minY!=null?opts.minY:Math.min(...ys), maxY=Math.max(...ys);
  if(opts.padY){ const r=(maxY-minY)||1; minY-=r*opts.padY; maxY+=r*opts.padY; if(opts.minY!=null)minY=opts.minY; }
  if(minX===maxX){minX-=1;maxX+=1;}
  const px=x=> pad.l+(x-minX)/(maxX-minX)*(W-pad.l-pad.r);
  const py=y=> H-pad.b-(y-minY)/((maxY-minY)||1)*(H-pad.t-pad.b);
  // gridlines
  let grid='';
  const ticks=opts.yTicks||4;
  for(let i=0;i<=ticks;i++){ const v=minY+(maxY-minY)*i/ticks; const y=py(v);
    grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="var(--line)" stroke-width="1"/>
    <text x="${pad.l-8}" y="${y+4}" text-anchor="end" font-family="var(--mono)" font-size="10" fill="var(--ink-faint)">${opts.yFmt?opts.yFmt(v):Math.round(v)}</text>`; }
  // x labels
  let xlab='';
  const xticks=opts.xLabels|| series[0].points.map(p=>p.x);
  const step=Math.ceil(xticks.length/ (opts.maxXLabels||8));
  (opts.xLabels?xticks:series[0].points.map(p=>p.x)).forEach((xv,i)=>{
    if(i%step) return; const x=px(typeof xv==='number'?xv:series[0].points[i].x);
    xlab+=`<text x="${x}" y="${H-pad.b+18}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="var(--ink-faint)">${opts.xFmt?opts.xFmt(xv):xv}</text>`;
  });
  let paths='';
  series.forEach(s=>{
    if(!s.points.length)return;
    const d=s.points.map((p,i)=>(i?'L':'M')+px(p.x)+' '+py(p.y)).join(' ');
    if(opts.area){
      const a=`M${px(s.points[0].x)} ${py(minY)} `+s.points.map(p=>'L'+px(p.x)+' '+py(p.y)).join(' ')+`L${px(s.points[s.points.length-1].x)} ${py(minY)} Z`;
      paths+=`<path d="${a}" fill="${s.color}" opacity=".10"/>`;
    }
    paths+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    if(opts.dots!==false) paths+=s.points.map(p=>`<circle cx="${px(p.x)}" cy="${py(p.y)}" r="3.2" fill="${s.color}" stroke="var(--card)" stroke-width="1.5"/>`).join('');
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" preserveAspectRatio="xMidYMid meet">${grid}${paths}${xlab}</svg>`;
}

function barChart(items, opts={}){
  // items:[{label,value,color}]
  const W=opts.w||760,H=opts.h||240,pad={l:46,r:14,t:20,b:40};
  if(!items.length)return '<div class="empty">No data yet</div>';
  const max=opts.max||Math.max(...items.map(i=>i.value))||1;
  const bw=(W-pad.l-pad.r)/items.length;
  let grid='';for(let i=0;i<=4;i++){const v=max*i/4;const y=H-pad.b-(v/max)*(H-pad.t-pad.b);
    grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="var(--line)"/><text x="${pad.l-8}" y="${y+4}" text-anchor="end" font-family="var(--mono)" font-size="10" fill="var(--ink-faint)">${opts.yFmt?opts.yFmt(v):Math.round(v)}</text>`;}
  let bars='';
  items.forEach((it,i)=>{
    const h=Math.max(2,(it.value/max)*(H-pad.t-pad.b));
    const x=pad.l+i*bw+bw*0.16, y=H-pad.b-h, w=bw*0.68;
    bars+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${it.color||'var(--terra)'}"/>`;
    if(opts.showVal) bars+=`<text x="${x+w/2}" y="${y-6}" text-anchor="middle" font-family="var(--mono)" font-size="9.5" fill="var(--ink-soft)">${opts.valFmt?opts.valFmt(it.value):Math.round(it.value)}</text>`;
    if(i%(opts.labStep||1)===0) bars+=`<text x="${x+w/2}" y="${H-pad.b+16}" text-anchor="middle" font-family="var(--mono)" font-size="9.5" fill="var(--ink-faint)">${it.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${grid}${bars}</svg>`;
}

function donut(items, size=130){
  const tot=items.reduce((s,i)=>s+i.value,0)||1; const r=size/2, sw=size*0.22, cr=r-sw/2;
  let a=-Math.PI/2,seg='';
  items.forEach(it=>{
    const frac=it.value/tot, a2=a+frac*2*Math.PI;
    const x1=r+cr*Math.cos(a),y1=r+cr*Math.sin(a),x2=r+cr*Math.cos(a2),y2=r+cr*Math.sin(a2);
    const large=frac>0.5?1:0;
    seg+=`<path d="M${x1} ${y1} A${cr} ${cr} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${it.color}" stroke-width="${sw}"/>`;
    a=a2;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${seg}</svg>`;
}

/* ---- coach briefing weaves WHOOP + day together ---- */
function morningBriefing(){
  const w=DB.whoop||{}; const rec=(w.recovery||[]); const slp=(w.sleep||[]);
  const lastRec=rec[rec.length-1], lastSlp=slp[slp.length-1];
  const bits=[];
  if(lastRec&&lastRec.recovery!=null){
    const r=lastRec.recovery; const band=r>=67?'green':r>=34?'yellow':'red';
    bits.push(band==='green'?`You're in the <b>green at ${Math.round(r)}%</b> — your body's ready for a hard session if you want one.`
      :band==='yellow'?`Recovery's in the <b>yellow at ${Math.round(r)}%</b> — train, but keep it moderate and listen to the legs.`
      :`Recovery's <b>red at ${Math.round(r)}%</b> — today is for rest or a gentle walk, not strain.`);
  } else bits.push(`No WHOOP recovery in yet this morning${proxyBase()?' — try a refresh':' — connect your proxy in the WHOOP tab'}.`);
  if(lastSlp&&lastSlp.performance!=null) bits.push(`You slept to <b>${Math.round(lastSlp.performance)}%</b> of need (${fmtDur(lastSlp.durationMs)}).`);
  const cal=morningCfg().calendar||[];
  if(cal.length) bits.push(`You've <b>${cal.length} thing${cal.length>1?'s':''}</b> on the calendar today.`);
  const openTasks=(morningCfg().tasks||[]).filter(t=>!t.done).length;
  if(openTasks) bits.push(`<b>${openTasks} task${openTasks>1?'s':''}</b> still open.`);
  return bits.join(' ');
}

/* ---- home training card (this week's fitness + motivation) ---- */
function cardTraining(){
  const w=DB.whoop||{}; const wk=w.workouts||[];
  if(!wk.length){
    return `<div class="card card-pad">${cardRefresh('refreshWhoopCard()','Sync latest WHOOP data')}<div class="kicker">This week</div><div class="h-sec">Training</div>
      <div class="empty">No workouts yet. <a onclick="go('whoop')" style="color:var(--terra);cursor:pointer;text-decoration:underline">Open WHOOP →</a></div></div>`;
  }
  const thisW=whoopWeekAgg(wk,0), lastW=whoopWeekAgg(wk,1);
  const fmtHM=ms=>{ if(!ms)return'0m'; const h=Math.floor(ms/3600000),m=Math.round((ms%3600000)/60000); return h?`${h}h ${m}m`:`${m}m`; };
  const last4=[0,1,2,3].map(i=>whoopWeekAgg(wk,i).count); const avg4=last4.reduce((a,b)=>a+b,0)/4;
  const rec7=avgKey(recent(w.recovery,7),'recovery');
  const recent3=wk.slice(-3).reverse().map(r=>`<div class="dlin">${sportLabel(r.sport)}<span class="v">${r.strain!=null?r.strain.toFixed(1):'—'}${r.distanceM?(' · '+(r.distanceM/1000).toFixed(1)+'km'):''}</span></div>`).join('');
  const motivate=()=>{
    if(thisW.count===0) return `Fresh week, clean slate. One good session today gets the flywheel turning.`;
    if(thisW.count>=avg4 && thisW.count>=3) return `<b>${thisW.count} sessions</b> banked — ahead of your 4-week pace. This is what consistency looks like; keep stacking.`;
    if(rec7!=null && rec7>=67) return `Recovery's strong (<b>${Math.round(rec7)}%</b>) with ${thisW.count} session${thisW.count>1?'s':''} in — your body's primed to push one hard today.`;
    return `<b>${thisW.count} session${thisW.count>1?'s':''}</b> so far. One more keeps the week on track — momentum beats intensity.`;
  };
  const dStr=thisW.strain-lastW.strain;
  const trend = lastW.strain? `<span style="font-family:var(--mono);font-size:11px;color:${dStr>=0?'var(--good)':'var(--ink-faint)'}">${dStr>=0?'▲':'▼'} ${Math.abs(Math.round(dStr/Math.max(1,lastW.strain)*100))}% vs last wk</span>`:'';
  return `<div class="card card-pad">${cardRefresh('refreshWhoopCard()','Sync latest WHOOP data')}<div class="kicker">This week · WHOOP</div><div class="h-sec">Training<span class="sub">${trend}</span></div>
    <div class="grid g3" style="gap:10px;margin-bottom:14px">
      <div class="card tile" style="padding:13px 6px;text-align:center"><div class="num" style="font-size:27px">${thisW.count}</div><div class="lbl">Sessions</div></div>
      <div class="card tile" style="padding:13px 6px;text-align:center"><div class="num" style="font-size:27px">${thisW.strain.toFixed(0)}</div><div class="lbl">Strain</div></div>
      <div class="card tile" style="padding:13px 6px;text-align:center"><div class="num" style="font-size:21px">${fmtHM(thisW.durMs)}</div><div class="lbl">Active</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">${recent3}</div>
    <div style="padding:13px 16px;background:var(--paper);border-radius:11px;border-left:3px solid var(--sage)">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint)">Coach</div>
      <div style="font-family:var(--serif);font-size:14px;color:var(--ink-soft);margin-top:4px;line-height:1.5">${motivate()}</div>
    </div>
    <div style="text-align:right;margin-top:10px"><a onclick="go('whoop')" style="font-family:var(--serif);font-size:13px;color:var(--terra);cursor:pointer">Full WHOOP →</a></div></div>`;
}

function mapsDirUrl(from,to){
  return 'https://www.google.com/maps/dir/?api=1'
    + '&origin='+encodeURIComponent(from||'')
    + '&destination='+encodeURIComponent(to||'')
    + '&travelmode=driving';
}

         ${t.normalText?`<span style="font-family:var(--mono);font-size:12px;color:var(--ink-faint)">vs ~${t.normalText} typical</span>`:''}</div>

      : window._trafficUnavailable

    <div style="display:flex;gap:9px;margin-top:12px;flex-wrap:wrap">

/* ============================================================
   TASKS — Projects + weekly goals (Apple-clean, performance-first)
   Data model (stored in DB.morning):
     projects:[{id,name,color,weekGoal,weekTarget}]
     tasks:[{id,text,done,projectId,priority(1-3),due'YYYY-MM-DD',createdAt,doneAt}]
   ============================================================ */
const TK_PALETTE=['var(--terra)','var(--sage)','var(--plum)','var(--gold)','var(--rose)','var(--sky)'];
const TK_PRIO={1:{c:'var(--rose)',l:'High'},2:{c:'var(--terra)',l:'Medium'},3:{c:'var(--ink-faint)',l:'Low'}};

function tasksCfg(){
  const m=morningCfg();
  if(!Array.isArray(m.projects)) m.projects=[];
  if(!Array.isArray(m.tasks)) m.tasks=[];
  // migrate legacy flat tasks -> full shape
  m.tasks.forEach(t=>{
    if(t.text===undefined && t.title!==undefined) t.text=t.title;
    if(t.projectId===undefined) t.projectId=null;
    if(t.priority===undefined) t.priority=2;
    if(t.due===undefined) t.due=null;
    if(t.createdAt===undefined) t.createdAt=Date.now();
    if(t.done && t.doneAt===undefined) t.doneAt=Date.now();
  });
  // seed starter projects once
  if(m.projects.length===0 && !m._projSeeded){
    m._projSeeded=true;
    m.projects=[
      {id:'p_work',     name:'Work',     color:'var(--terra)', weekGoal:'Move the big rocks forward', weekTarget:5},
      {id:'p_personal', name:'Personal', color:'var(--sage)',  weekGoal:'Health, home & admin',        weekTarget:3}
    ];
    save();
  }
  return m;
}
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function tkWeekStart(){ const d=new Date(); d.setHours(0,0,0,0); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.getTime(); }
function tkInWeek(ts){ if(!ts)return false; const s=tkWeekStart(); return ts>=s && ts<s+7*864e5; }
function tkStreak(tasks){
  const days=new Set(tasks.filter(t=>t.done&&t.doneAt).map(t=>new Date(t.doneAt).toDateString()));
  let n=0, d=new Date(); d.setHours(0,0,0,0);
  if(!days.has(d.toDateString())) d.setDate(d.getDate()-1); // grace: today not done yet still counts yesterday's streak
  while(days.has(d.toDateString())){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function tkRing(pct,size,stroke,color){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-Math.min(1,(pct||0)/100));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line2)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" class="tk-ring-num">${Math.round(pct||0)}%</text></svg>`;
}
function tkDueChip(t){
  if(!t.due) return '';
  const now=new Date(); now.setHours(0,0,0,0);
  const d=new Date(t.due+'T00:00:00'); const diff=Math.round((d-now)/864e5);
  let label,bg,fg;
  if(diff<0){ label=`${-diff}d over`; bg='rgba(194,85,78,.15)'; fg='var(--bad)'; }
  else if(diff===0){ label='Today'; bg='rgba(14,124,134,.15)'; fg='var(--terra-deep)'; }
  else if(diff===1){ label='Tom'; bg='var(--paper2)'; fg='var(--ink-soft)'; }
  else if(diff<7){ label=d.toLocaleDateString('en-ZA',{weekday:'short'}); bg='var(--paper2)'; fg='var(--ink-soft)'; }
  else { label=d.toLocaleDateString('en-ZA',{day:'numeric',month:'short'}); bg='var(--paper2)'; fg='var(--ink-soft)'; }
  return `<span class="tk-due" style="background:${bg};color:${fg}">${label}</span>`;
}
function tkDueCell(t){
  const today=todayISO();
  let lab='+ due', fg='var(--ink-faint)', bd='var(--line)', cls='tk-duecol';
  if(t.due){
    cls+=' set';
    lab=new Date(t.due+'T00:00:00').toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
    if(!t.done && t.due<today){ fg='var(--bad)'; bd='rgba(194,85,78,.5)'; }
    else if(!t.done && t.due===today){ fg='var(--terra-deep)'; bd='rgba(14,124,134,.5)'; lab='Today'; }
    else { fg='var(--ink-soft)'; bd='var(--line2)'; }
  }
  return `<span class="${cls}" style="color:${fg};border-color:${bd}" title="${t.due?('Due '+t.due+' — tap to change'):'Set a due date'}">${lab}<input type="date" value="${t.due||''}" onchange="setTaskDue('${t.id}',this.value)" onclick="event.stopPropagation()"></span>`;
}
function setTaskDue(id,val){ const t=tasksCfg().tasks.find(x=>x.id===id); if(!t)return;
  t.due=val||null; save(); renderHome(); }
function tkSortOpen(a,b){
  const t=todayISO();
  const rank=x=> x.due ? (x.due<t?0:x.due===t?1:2) : 3;
  if(rank(a)!==rank(b)) return rank(a)-rank(b);
  if((a.due||'')!==(b.due||'')){ if(!a.due)return 1; if(!b.due)return -1; return a.due<b.due?-1:1; }
  if((a.priority||2)!==(b.priority||2)) return (a.priority||2)-(b.priority||2);
  return (a.createdAt||0)-(b.createdAt||0);
}
function tkProjTasks(m,pid,known){
  return m.tasks.filter(t=> pid==='__inbox' ? (!t.projectId||!known.has(t.projectId)) : t.projectId===pid);
}
function tkCoach(open,overdue,doneWeek,plannedWeek,streak){
  if(overdue>0) return `You're carrying <b>${overdue}</b> overdue task${overdue>1?'s':''}. Clear those first — nothing erodes momentum like a backlog you're stepping around.`;
  if(plannedWeek && doneWeek>=plannedWeek) return `Every weekly target met — <b>${doneWeek}</b> done. Bank the win, then pull one task forward from next week while you're hot.`;
  if(streak>=3) return `<b>${streak}-day</b> streak going. Protect it: choose the single hardest task and start there before the day fills up.`;
  if(open===0) return `Clean slate. Set a weekly target on each project so your effort has a finish line to run at.`;
  return `Performance is a stack of decisive days. Pick your three most important tasks below and close them before noon.`;
}

function cardTasks(){
  const m=tasksCfg();
  const known=new Set(m.projects.map(p=>p.id));
  const hasInbox=m.tasks.some(t=>!t.projectId||!known.has(t.projectId));
  const projects=[...m.projects, ...(hasInbox?[{id:'__inbox',name:'Inbox',color:'var(--ink-faint)',weekGoal:'Unsorted — file these into a project',weekTarget:0,_virtual:true}]:[])];

  const openAll=m.tasks.filter(t=>!t.done);
  const doneWeek=m.tasks.filter(t=>t.done&&tkInWeek(t.doneAt)).length;
  const plannedWeek=m.projects.reduce((s,p)=>s+(+p.weekTarget||0),0);
  const overdue=openAll.filter(t=>t.due&&t.due<todayISO()).length;
  const pctWeek=plannedWeek?Math.min(100,Math.round(doneWeek/plannedWeek*100)):(doneWeek?100:0);
  const streak=tkStreak(m.tasks);

  // weekly completion bars (Mon..Sun)
  const s=tkWeekStart(); const dayCounts=[0,0,0,0,0,0,0];
  m.tasks.forEach(t=>{ if(t.done&&t.doneAt){ const i=Math.floor((new Date(t.doneAt).setHours(0,0,0,0)-s)/864e5); if(i>=0&&i<7) dayCounts[i]++; }});
  const maxDay=Math.max(1,...dayCounts);
  const todayIdx=(new Date().getDay()+6)%7;
  const DOW=['M','T','W','T','F','S','S'];
  const barsHtml=dayCounts.map((c,i)=>`<div class="tk-wkcol"><div class="bar ${i===todayIdx?'today':''}" style="height:${Math.round(c/maxDay*40)+3}px" title="${c} done"></div><div class="d">${DOW[i]}</div></div>`).join('');

  // today's focus — top 3 open (overdue/today/priority)
  const focus=openAll.slice().sort(tkSortOpen).slice(0,3);
  const projColor=id=>{ const p=m.projects.find(x=>x.id===id); return p?p.color:'var(--ink-faint)'; };
  const focusHtml=focus.length
    ? `<div class="tk-focus">${focus.map(t=>`<span class="tk-fchip" onclick="editTask('${t.id}')" style="cursor:pointer"><span class="fdot" style="background:${projColor(t.projectId)}"></span>${tkEsc(t.text)}${tkDueChip(t)}</span>`).join('')}</div>`
    : `<div style="font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:13px">Nothing urgent — add a task to set today's focus.</div>`;

  // project cards
  const projHtml=projects.map(p=>{
    const list=tkProjTasks(m,p.id,known);
    const open=list.filter(t=>!t.done).sort(tkSortOpen);
    const done=list.filter(t=>t.done).sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
    const dWeek=list.filter(t=>t.done&&tkInWeek(t.doneAt)).length;
    const tgt=+p.weekTarget||0;
    const pct=tgt?Math.min(100,Math.round(dWeek/tgt*100)):0;
    const row=t=>`<div class="tk-item">
        <span class="tk-check ${t.done?'on':''}" onclick="toggleTask('${t.id}')">${t.done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg>':''}</span>
        ${!t.done?`<span class="tk-flag" onclick="cyclePriority('${t.id}')" title="${TK_PRIO[t.priority||2].l} priority — click to change" style="background:${TK_PRIO[t.priority||2].c}"></span>`:''}
        <span class="tk-txt ${t.done?'done':''}" onclick="editTask('${t.id}')">${tkEsc(t.text)}</span>
        ${tkDueCell(t)}
        <span class="tk-x" onclick="delTask('${t.id}')">×</span></div>`;
    const goalLine = tgt
      ? `<div class="tk-goal">${p.weekGoal?tkEsc(p.weekGoal)+' · ':''}<b>${dWeek}/${tgt}</b> this week</div>
         <div class="tk-bar"><i style="width:${pct}%;background:${p.color}"></i></div>`
      : (p.weekGoal?`<div class="tk-goal">${tkEsc(p.weekGoal)}</div>`:'');
    const doneBlock = done.length
      ? `<div class="tk-done-head" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">${done.length} done ▾</div><div style="display:none">${done.map(row).join('')}</div>`
      : '';
    return `<div class="tk-proj" style="border-top-color:${p.color}">
      <div class="tk-proj-head">
        <div><div class="tk-proj-name"><span class="tk-pdot" style="background:${p.color}"></span>${tkEsc(p.name)}</div></div>
        ${p._virtual?'':`<svg class="tk-gear" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="editProject('${p.id}')"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>`}
      </div>
      ${goalLine}
      <div class="tk-list">${open.map(row).join('')||`<div style="font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:13px;padding:8px 0">All clear here.</div>`}${doneBlock}</div>
      ${p._virtual?'':`<div class="tk-add">
        <input id="tkin_${p.id}" placeholder="Add to ${tkEsc(p.name)}…" onkeydown="if(event.key==='Enter')addTaskTo('${p.id}')">
        <button onclick="addTaskTo('${p.id}')" title="Add">+</button></div>`}
    </div>`;
  }).join('');

  return `<div class="card card-pad" style="margin-bottom:18px">
    <div class="kicker">Get it done</div>
    <div class="h-sec">Tasks<span class="sub">${openAll.length} open · ${doneWeek} done this week</span></div>
    <div class="tk-over">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        ${tkRing(pctWeek,108,11,'var(--terra)')}
        <div style="font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--ink-faint)">${plannedWeek?`${doneWeek} / ${plannedWeek} weekly goal`:`${doneWeek} done this week`}</div>
      </div>
      <div>
        <div class="tk-metrics" style="margin-bottom:14px">
          <div class="tk-metric"><div class="v" style="color:${overdue?'var(--bad)':'var(--ink)'}">${overdue}</div><div class="l">Overdue</div></div>
          <div class="tk-metric"><div class="v">${openAll.length}</div><div class="l">Open</div></div>
          <div class="tk-metric"><div class="v" style="color:var(--sage-deep)">${streak}<span style="font-size:15px"> d</span></div><div class="l">Streak</div></div>
        </div>
        <div style="font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px">Today's focus</div>
        ${focusHtml}
      </div>
      <div style="min-width:150px">
        <div style="font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px">This week</div>
        <div class="tk-wkbars">${barsHtml}</div>
      </div>
    </div>
    <div class="coach" style="margin:18px 0 4px"><div class="q">Coach</div><p>${tkCoach(openAll.length,overdue,doneWeek,plannedWeek,streak)}</p></div>
    <div class="tk-grid">
      ${projHtml}
      <div class="tk-newproj" onclick="addProject()">+ New project</div>
    </div></div>`;
}
function tkEsc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addTaskTo(pid){
  const i=document.getElementById('tkin_'+pid); if(!i)return; const v=i.value.trim(); if(!v)return;
  tasksCfg().tasks.push({id:'t'+Date.now(),text:v,done:false,projectId:pid,priority:2,due:null,createdAt:Date.now()});
  save(); renderHome();

async function fetchWeather(){
  try{
    // Open-Meteo — keyless, CORS-enabled
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-33.9249&longitude=18.4241&current=temperature_2m,weather_code,wind_speed_10m&timezone=Africa%2FJohannesburg');
    const j=await r.json(); const c=j.current;
    const code=c.weather_code;
    const icon=code<=1?'☀️':code<=3?'⛅':code<=48?'🌫':code<=67?'🌧':code<=77?'❄️':code<=82?'🌦':code<=99?'⛈':'🌡';
    const desc=code===0?'Clear':code<=2?'Partly cloudy':code===3?'Overcast':code<=48?'Fog':code<=55?'Drizzle':code<=67?'Rain':code<=77?'Snow':code<=82?'Showers':code<=99?'Thunderstorm':'—';
    morningCfg().weather={temp:Math.round(c.temperature_2m),icon,desc,wind:Math.round(c.wind_speed_10m),fetchedAt:new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})};
    save(); renderHomeIfActive();
  }catch(e){}
}
async function fetchCurrency(){
  // The old exchangerate.host keyless endpoint now requires a paid access_key,
  // so it silently returned no rates. These two are keyless + CORS-enabled.
  const stamp = extra => 'updated '+new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})+(extra?' · '+extra:'');
  const commit = (usdzar,gbpzar,eurzar,extra)=>{
    morningCfg().currency={usdzar,gbpzar,eurzar,fetchedAt:stamp(extra)};
    save(); renderHomeIfActive();
  };
  // PRIMARY: open.er-api.com — keyless, live USD base (includes ZAR, GBP, EUR)
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    const j=await r.json();
    if(!j||j.result!=='success'||!j.rates||j.rates.ZAR==null) throw new Error('primary unavailable');
    const rt=j.rates;
    const day = j.time_last_update_utc ? 'rate '+new Date(j.time_last_update_utc).toLocaleDateString('en-ZA',{day:'numeric',month:'short'}) : '';
    commit(rt.ZAR, rt.ZAR/rt.GBP, rt.ZAR/rt.EUR, day);
    return;
  }catch(e){ /* fall through to backup */ }
  // FALLBACK: Frankfurter (ECB reference rates) — also keyless + CORS
  try{
    const r2=await fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=ZAR,GBP,EUR');
    const j2=await r2.json(); const rt=j2.rates;
    if(!rt||rt.ZAR==null) throw new Error('fallback unavailable');
    commit(rt.ZAR, rt.ZAR/rt.GBP, rt.ZAR/rt.EUR, j2.date?('ECB '+j2.date):'');
    return;
  }catch(e2){ const el=document.getElementById('fxEmpty'); if(el) el.textContent='Could not load rates (offline?).'; }
}

/* ============ RETIREMENT (income projection) ============ */
const RET_DEFAULTS = {growth:8, inflation:5, contribMonthly:25000, drawdown:4, includeHBI:50,
  rentalFourways:75000, rentalTokai:30000, rentalGrowth:6};
function getRet(){ DB.retire = Object.assign({}, RET_DEFAULTS, DB.retire||{}); return DB.retire; }

function projectRetirement(){
  const r=getRet();
  const yrs=yearsBetween(TODAY,DB.profile.targetRetirementDate);
  const ra=DB.finance.accounts.find(a=>a.id==='inn8').value;
  const ggg=DB.finance.accounts.find(a=>a.id==='ggg').value;
  const hbi=DB.finance.accounts.find(a=>a.id==='hbi').value*(r.includeHBI/100);
  const startCapital=ra+ggg+hbi;
  const g=r.growth/100, gm=Math.pow(1+g,1/12)-1;
  const months=Math.round(yrs*12);
  let fv=startCapital;
  for(let m=0;m<months;m++){ fv=fv*(1+gm)+r.contribMonthly; }
  const realFactor=Math.pow(1+r.inflation/100, yrs);
  const fvReal=fv/realFactor;
  const annual=fv*(r.drawdown/100);
  const monthly=annual/12;
  const monthlyReal=monthly/realFactor;
  // Property rental income at retirement — grow at rentalGrowth% pa for yrs years
  const rg=r.rentalGrowth/100;
  const rentalAtRetire=(r.rentalFourways+r.rentalTokai)*Math.pow(1+rg,yrs);
  const rentalAtRetireReal=rentalAtRetire/realFactor;
  // Total: use nominal figures (actual rands received at retirement)
  const totalNominal=monthly+rentalAtRetire;
  // Also show in today's money
  const totalMonthlyReal=monthlyReal+rentalAtRetireReal;
  return {yrs,startCapital,fv,fvReal,annual,monthly,monthlyReal,ra,ggg,hbi,
    rentalToday:r.rentalFourways+r.rentalTokai,
    rentalAtRetire,rentalAtRetireReal,totalNominal,totalMonthlyReal};
}

/* setRet: save the value, update only the label and output nodes — never touch the sliders */
function setRet(k,v){
  getRet()[k]=v; save();
  // Update the label next to the slider that moved
  const labelMap={growth:'lg',inflation:'li',drawdown:'ld',includeHBI:'lh',
    contribMonthly:'lc',rentalFourways:'lrf',rentalTokai:'lrt',rentalGrowth:'lrg'};
  const labelEl=document.getElementById(labelMap[k]);
  if(labelEl){
    if(k==='contribMonthly') labelEl.textContent=ZAR(v);
    else if(k==='rentalFourways'||k==='rentalTokai') labelEl.textContent=ZAR(v)+'/mo';
    else labelEl.textContent=v+'% '+(k==='rentalGrowth'?'pa':'');
  }
  // Recompute and patch outputs only (no DOM rebuild — sliders keep their focus/position)
  const r=getRet(); const p=projectRetirement();
  const tot=document.getElementById('ret-total');
  const post=document.getElementById('ret-post');
  const tbl=document.getElementById('ret-table');
  if(tot) tot.innerHTML=ZAR(p.totalNominal)+'<span style="font-size:24px;color:var(--ink-faint)">/mo</span>';
  if(post) post.textContent='Nominal rands at age 60 \u00b7 ('+ZAR(p.totalMonthlyReal)+'/mo today\'s money) \u00b7 capital '+ZAR(p.monthly)+'/mo + rental '+ZAR(p.rentalAtRetire)+'/mo';
  if(tbl) tbl.innerHTML=retMechRows(r,p);
  // Rebuild chart (it lives in its own div, separate from sliders)
  const g=r.growth/100, gm=Math.pow(1+g,1/12)-1, months=Math.round(p.yrs*12);
  let fv=p.startCapital, pts=[]; const sy=new Date().getFullYear()+new Date().getMonth()/12;
  for(let m=0;m<=months;m++){ if(m%3===0) pts.push({x:sy+m/12,y:fv}); fv=fv*(1+gm)+r.contribMonthly; }
  const chartEl=document.getElementById('ret-chart');
  if(chartEl) chartEl.innerHTML=lineChart([{name:'Projected capital',color:'var(--terra)',points:pts}],
    {h:240,area:true,dots:false,minY:0,yFmt:v=>ZARk(v),xFmt:v=>Math.round(v),maxXLabels:7})+
    '<div class="legend"><span><span class="dot" style="background:var(--terra)"></span>Projected capital growth to age 60</span></div>';
}
function resetRet(){ DB.retire=null; save(); _retireRendered=false; renderRetire(); toast('Assumptions reset to defaults'); }
function runYearTotals(){
  const out=[];
  for(const y in DB.run){ let run=0,cyc=0,n=0;
    for(const m in DB.run[y]){ run+=DB.run[y][m].run||0; cyc+=DB.run[y][m].cycle||0; n++; }
    out.push({year:+y,run:Math.round(run*10)/10,cycle:Math.round(cyc*10)/10,months:n});
  }
  return out.sort((a,b)=>a.year-b.year);
}
function renderRun(){
  const totals=runYearTotals();
  const P=document.getElementById('pane-run');
  const allRun=totals.reduce((s,t)=>s+t.run,0);
  const allCyc=totals.reduce((s,t)=>s+t.cycle,0);
  const best=totals.reduce((b,t)=>t.run>b.run?t:b,totals[0]);
  const avgPerYr=allRun/totals.filter(t=>t.run>0).length;
  const hasCycle=totals.some(t=>t.cycle>0);

  const runChart=lineChart([{name:'Running',color:'var(--sage)',points:totals.map(t=>({x:t.year,y:t.run}))}].concat(
    hasCycle?[{name:'Cycling',color:'var(--terra)',points:totals.filter(t=>t.cycle>0).map(t=>({x:t.year,y:t.cycle}))}]:[]),
    {h:250,area:false,yFmt:v=>Math.round(v),xFmt:v=>("'"+String(v).slice(2)),padY:.08,minY:0,maxXLabels:10});

  P.innerHTML=`
   <div class="coach"><div class="q">Twenty years on the road</div>
     <p>This is one of the most valuable things you've kept: <b>two decades</b> of movement data. You've run <b>${Math.round(allRun)} km</b> since 2005 — that's most of the way ${distanceMetaphor(allRun)}. The story it tells isn't about any single year; it's that you keep lacing up. Your strongest year was <b>${best.year}</b> at ${Math.round(best.run)} km.</p></div>
   <div class="grid g4" style="margin-bottom:24px">
     <div class="card tile"><div class="accent-bar" style="background:var(--sage)"></div><div class="lbl">Lifetime Running</div><div class="num">${Math.round(allRun)}<small> km</small></div><div class="foot">since 2005</div></div>
     <div class="card tile"><div class="accent-bar" style="background:var(--sage-deep)"></div><div class="lbl">Avg / Active Year</div><div class="num">${Math.round(avgPerYr)}<small> km</small></div><div class="foot">when running</div></div>
     <div class="card tile"><div class="accent-bar" style="background:var(--gold)"></div><div class="lbl">Best Year</div><div class="num">${Math.round(best.run)}<small> km</small></div><div class="foot">${best.year}</div></div>
     <div class="card tile"><div class="accent-bar" style="background:var(--terra)"></div><div class="lbl">Lifetime Cycling</div><div class="num">${Math.round(allCyc)}<small> km</small></div><div class="foot">2018–2022</div></div>
   </div>
   <div class="card card-pad" style="margin-bottom:22px">
     <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap">
       <div><div class="kicker">The long view</div><div class="h-sec" style="margin-bottom:6px">Kilometres per year</div></div>
       <button class="btn primary" onclick="openRunEntry()">+ Log a month</button>
     </div>
     <div class="chart-box">${runChart}</div>
     <div class="legend"><span><span class="dot" style="background:var(--sage)"></span>Running</span>${hasCycle?'<span><span class="dot" style="background:var(--terra)"></span>Cycling</span>':''}</div>
   </div>
   <div class="card card-pad">
     <div class="kicker">Year by year</div><div class="h-sec">The record</div>
     <div class="scroll-x"><table class="clean"><thead><tr><th>Year</th><th class="r">Running km</th><th class="r">Cycling km</th><th class="r">Months logged</th><th class="r">vs prev</th></tr></thead><tbody>
     ${totals.slice().reverse().map((t,i,arr)=>{
        const prev=arr[i+1]; const d=prev?t.run-prev.run:null;
        const dc=d==null?'':d>0?'var(--good)':d<0?'var(--bad)':'var(--ink-faint)';
        return `<tr><td class="mono">${t.year}</td><td class="r mono">${t.run||'—'}</td><td class="r mono">${t.cycle||'—'}</td><td class="r mono">${t.months}</td>
          <td class="r mono" style="color:${dc}">${d==null?'—':(d>0?'+':'')+Math.round(d)}</td></tr>`;
     }).join('')}
     </tbody></table></div>
   </div>`;
}
function distanceMetaphor(km){
  if(km>=9000) return 'around the coastline of South Africa';
  if(km>=6000) return 'from Cape Town to Cairo';
  if(km>=3000) return 'the length of Africa twice over';
  if(km>=1500) return 'from Cape Town to Johannesburg';
  return 'a serious distance';
}
function openRunEntry(){
  const yrNow=new Date().getFullYear();
  showModal(`<div class="modal-head"><div><h2>Log a month</h2><div class="ms">Add or update running / cycling distance</div></div>
    <button class="x" onclick="closeModal()">${xSvg()}</button></div>
    <div class="modal-body">
      <div class="row3">
        <div class="field"><label>Year</label><input type="number" id="re_year" value="${yrNow}" min="2000" max="2100"></div>
        <div class="field"><label>Month</label><select id="re_month">${MONTHS.map((m,i)=>`<option value="${i+1}" ${i===new Date().getMonth()?'selected':''}>${m}</option>`).join('')}</select></div>
        <div class="field"><label>Run (km)</label><input type="number" id="re_run" step="0.1" placeholder="0"></div>
      </div>
      <div class="field"><label>Cycle (km) — optional</label><input type="number" id="re_cyc" step="0.1" placeholder="0"></div>
      <button class="btn primary" onclick="saveRun()">Save</button>
    </div>`);

function saveRun(){
  const y=document.getElementById('re_year').value, m=document.getElementById('re_month').value;
  const run=parseFloat(document.getElementById('re_run').value)||0;
  const cyc=parseFloat(document.getElementById('re_cyc').value)||0;
  DB.run[y]=DB.run[y]||{}; DB.run[y][m]={run:Math.round(run*100)/100,cycle:Math.round(cyc*100)/100};
  save(); closeModal(); renderRun(); renderHome(); toast(`Logged ${MONTHS[m-1]} ${y}`);
}

function markerStatus(val,lo,hi){
  if(lo==null&&hi==null) return {t:'tracked',c:'var(--ink-faint)',bg:'var(--paper2)'};
  if(hi!=null&&val>hi) return {t:'above range',c:'var(--bad)',bg:'rgba(191,106,94,.12)'};
  if(lo!=null&&val<lo) return {t:'below range',c:'var(--bad)',bg:'rgba(191,106,94,.12)'};
  return {t:'in range',c:'var(--good)',bg:'rgba(111,148,104,.13)'};
}
function markerChart(arr,col){
  // line chart with reference-range band; x = decimal year
  const W=340,H=150,pad={l:42,r:12,t:14,b:26};
  const pts=arr.map(r=>({x:new Date(r.date).getFullYear()+new Date(r.date).getMonth()/12,y:r.value}));
  const lo=arr[0].low, hi=arr[0].high;
  const ys=pts.map(p=>p.y).concat(lo!=null?[lo]:[]).concat(hi!=null?[hi]:[]);
  let minY=Math.min(...ys), maxY=Math.max(...ys); const r=(maxY-minY)||1; minY-=r*0.18; maxY+=r*0.18;
  let minX=Math.min(...pts.map(p=>p.x)), maxX=Math.max(...pts.map(p=>p.x)); if(minX===maxX){minX-=1;maxX+=1;}
  const px=x=>pad.l+(x-minX)/(maxX-minX)*(W-pad.l-pad.r);
  const py=y=>H-pad.b-(y-minY)/((maxY-minY)||1)*(H-pad.t-pad.b);

  let band='';
  const yTop = hi!=null? py(hi) : pad.t;
  const yBot = lo!=null? py(lo) : H-pad.b;
  if(lo!=null||hi!=null) band=`<rect x="${pad.l}" y="${yTop}" width="${W-pad.l-pad.r}" height="${Math.max(0,yBot-yTop)}" fill="var(--good)" opacity=".09"/>`;
  // y labels (range edges + min/max)
  let yl='';
  [['',minY],['',maxY]].forEach(()=>{});
  const labels=[]; if(lo!=null)labels.push(lo); if(hi!=null)labels.push(hi);
  labels.forEach(v=>{ yl+=`<line x1="${pad.l}" y1="${py(v)}" x2="${W-pad.r}" y2="${py(v)}" stroke="var(--good)" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>
    <text x="${pad.l-6}" y="${py(v)+3}" text-anchor="end" font-family="var(--mono)" font-size="9" fill="var(--ink-faint)">${v}</text>`; });
  // path + dots colored by in/out of range
  const d=pts.map((p,i)=>(i?'L':'M')+px(p.x)+' '+py(p.y)).join(' ');
  const dots=pts.map((p,i)=>{ const out=(lo!=null&&p.y<lo)||(hi!=null&&p.y>hi);
    return `<circle cx="${px(p.x)}" cy="${py(p.y)}" r="3.4" fill="${out?'var(--bad)':col}" stroke="var(--card)" stroke-width="1.5"/>`; }).join('');
  // x labels (first & last year)
  const xl=`<text x="${px(pts[0].x)}" y="${H-8}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--ink-faint)">'${String(Math.round(pts[0].x)).slice(2)}</text>
    <text x="${px(pts[pts.length-1].x)}" y="${H-8}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--ink-faint)">'${String(Math.round(pts[pts.length-1].x)).slice(2)}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${band}${yl}<path d="${d}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round"/>${dots}${xl}</svg>`;
}
function trendArrow(arr){
  if(arr.length<2) return '';

  const lo=arr[0].low,hi=arr[0].high;

  const dir=b>a?'up':b<a?'down':'flat';
  if(dir==='flat')return'';
  let good;
  if(hi!=null&&lo==null) good=(dir==='down');
  else if(lo!=null&&hi==null) good=(dir==='up');
  else good=null;
  const col= good==null?'var(--ink-faint)':good?'var(--good)':'var(--warn)';
  const ar=dir==='up'?'↑':'↓';
  return `<span style="color:${col};font-family:var(--mono);font-size:12px">${ar}</span>`;
}

function healthCoach(markers,flagged){

function parseCSVLine(line){ const out=[];let c='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(ch==='"')q=!q; else if(ch===','&&!q){out.push(c);c='';} else c+=ch;}
  out.push(c); return out; }
function parseRange(header){
  // returns {name, low, high}
  let name=header.trim(), low=null, high=null;
  const m=header.match(/\(([^)]*)\)\s*$/);
  if(m){ const inside=m[1].replace(/,/g,'.').trim(); name=header.slice(0,m.index).trim();
    let mm;
    if((mm=inside.match(/^<\s*([\d.]+)/))) high=+mm[1];
    else if((mm=inside.match(/^>\s*([\d.]+)/))) low=+mm[1];
    else if((mm=inside.match(/([\d.]+)\s*[-–]\s*([\d.]+)/))){ low=+mm[1]; high=+mm[2]; }
  }
  return {name,low,high};
}
function handleHealthCSV(file){
  if(!file)return; const reader=new FileReader();

    const cols=header.slice(1).map(parseRange);

    for(let i=1;i<lines.length;i++){

        ${Object.entries(byM).map(([m,a])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-family:var(--serif);font-size:14px"><span>${m}</span><span class="mono" style="color:var(--ink-faint)">${a.length} reading${a.length>1?'s':''}</span></div>`).join('')}

      </div>`;
  }catch(err){ document.getElementById('hPreview').innerHTML=`<div style="margin-top:16px;color:var(--bad);font-family:var(--mono);font-size:13px">⚠ ${err.message}</div>`; }
  };
  reader.readAsText(file);
}
function normalizeDate(s){
  if(!s)return null; s=s.trim();
  let m;
  if((m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/))) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  if((m=s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/))) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  const d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10);
  return null;
}

const CLUB_ORDER=['Driver','3 Wood','2 Iron','4 Iron','5 Iron','6 Iron','7 Iron','8 Iron','9 Iron','Pitching Wedge','Gap Wedge','52° Wedge','56° Wedge','60° Wedge','Putter'];
const CLUB_ABBR={'Driver':'Dr','3 Wood':'3W','2 Iron':'2i','4 Iron':'4i','5 Iron':'5i','6 Iron':'6i','7 Iron':'7i','8 Iron':'8i','9 Iron':'9i','Pitching Wedge':'PW','Gap Wedge':'GW','52° Wedge':'52°','56° Wedge':'56°','60° Wedge':'60°','Putter':'Pt'};
// canonical bag — every club shows in the bag view even before it has shot data
const BAG=[...CLUB_ORDER];
// map common launch-monitor club-type names onto the canonical bag
const CLUB_ALIASES={
  'driver':'Driver','3 wood':'3 Wood','three wood':'3 Wood','3w':'3 Wood',
  '2 iron':'2 Iron','4 iron':'4 Iron','5 iron':'5 Iron','6 iron':'6 Iron','7 iron':'7 Iron','8 iron':'8 Iron','9 iron':'9 Iron',
  'pitching wedge':'Pitching Wedge','pw':'Pitching Wedge','wedge':'Pitching Wedge',
  'gap wedge':'Gap Wedge','gw':'Gap Wedge','approach wedge':'Gap Wedge','aw':'Gap Wedge',
  'sand wedge':'56° Wedge','sw':'56° Wedge',           // default a generic SW to the 56°
  'lob wedge':'60° Wedge','lw':'60° Wedge',             // default a generic LW to the 60°
  '50 degree':'Gap Wedge','52 degree':'52° Wedge','54 degree':'52° Wedge',
  '56 degree':'56° Wedge','58 degree':'56° Wedge','60 degree':'60° Wedge',
  '52°':'52° Wedge','56°':'56° Wedge','60°':'60° Wedge','putter':'Putter'
};
function canonicalClub(name){
  if(!name) return null;
  const k=name.trim().toLowerCase().replace(/\s+/g,' ');
  if(CLUB_ALIASES[k]) return CLUB_ALIASES[k];
  // tolerant degree match e.g. "60° Sand Wedge", "Vokey 56", "SM9 58"
  const deg=k.match(/(\d{2})\s*(?:°|deg|degree)?/);
  if(deg){ const d=+deg[1]; if(d>=48&&d<=64){ if(d<=50)return'Gap Wedge'; if(d<=53)return'52° Wedge'; if(d<=58)return'56° Wedge'; return'60° Wedge'; } }
  // title-case fallback so unknown clubs still track
  return name.trim().replace(/\b\w/g,c=>c.toUpperCase());
}
function golf(){ return DB.golf||{shots:[],rounds:[]}; }
function clubsWithData(){ return [...new Set(golf().shots.map(s=>s.club))]; }
function clubsInBag(){
  // union of canonical bag + any extra clubs that have data, sorted by bag order
  const extra=clubsWithData().filter(c=>!BAG.includes(c));
  return [...BAG, ...extra].sort((a,b)=>{
    const ia=CLUB_ORDER.indexOf(a), ib=CLUB_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);

  '7 Iron':       {carry:155, chs:82,  disp:8},
  '8 Iron':       {carry:143, chs:78,  disp:7},
  '9 Iron':       {carry:130, chs:75,  disp:6.5},
  'Pitching Wedge':{carry:117,chs:72,  disp:6},
  'Gap Wedge':    {carry:104, chs:68,  disp:5.5},

// robust clubhead speed: launch monitors emit junk CHS readings, so use a filtered

/* ---- Outlier rejection (IQR fences). Removes mishits/junk before any stat. ---- */
function rejectOutliers(vals){
  const v=vals.filter(x=>x!=null&&isFinite(x));
  if(v.length<4) return v;                       // too few to fence
  const s=v.slice().sort((a,b)=>a-b);
  const q=p=>{const i=(s.length-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return s[lo]+(s[hi]-s[lo])*(i-lo);};
  const q1=q(0.25), q3=q(0.75), iqr=q3-q1;
  const lo=q1-1.5*iqr, hi=q3+1.5*iqr;

function meanOf(a){ return a.length? a.reduce((s,x)=>s+x,0)/a.length : null; }
