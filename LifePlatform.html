function parseCSVLine(line){ const out=[];let c='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(ch==='"')q=!q; else if(ch===','&&!q){out.push(c);c='';} else c+=ch;}
  out.push(c); return out; }
function parseRange(header){
  // returns {name, low, high}
  let name=header.trim(), low=null, high=null;
  const m=header.match(/\(([^)]*)\)\s*$/);
  if(m){ const inside=m[1].replace(/,/g,'.').trim(); name=header.slice(0,m.index).trim();
    let mm;
    if((mm=inside.match(/^<\s*([\d.]+)/))) high=+mm[1];
    else if((mm=inside.match(/^>\s*([\d.]+)/))) low=+mm[1];
    else if((mm=inside.match(/([\d.]+)\s*[-–]\s*([\d.]+)/))){ low=+mm[1]; high=+mm[2]; }
  }
  return {name,low,high};
}
function handleHealthCSV(file){
  if(!file)return; const reader=new FileReader();
  reader.onload=e=>{ try{
    let txt=e.target.result.replace(/^\uFEFF/,'');

    const header=parseCSVLine(lines[0]);
    const cols=header.slice(1).map(parseRange);

      const cells=parseCSVLine(lines[i]);

      });

        ${Object.entries(byM).map(([m,a])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-family:var(--serif);font-size:14px"><span>${m}</span><span class="mono" style="color:var(--ink-faint)">${a.length} reading${a.length>1?'s':''}</span></div>`).join('')}
        <button class="btn primary" style="width:100%;justify-content:center;margin-top:14px" onclick="commitBlood()">Add to health panel</button>
      </div>`;
  }catch(err){ document.getElementById('hPreview').innerHTML=`<div style="margin-top:16px;color:var(--bad);font-family:var(--mono);font-size:13px">⚠ ${err.message}</div>`; }
  };
  reader.readAsText(file);
}
function normalizeDate(s){
  if(!s)return null; s=s.trim();
  let m;
  if((m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/))) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  if((m=s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/))) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  const d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10);
  return null;
}
function commitBlood(){

/* ============ GOLF (compact) ============ */
const CLUB_ORDER=['Driver','3 Wood','2 Iron','4 Iron','5 Iron','6 Iron','7 Iron','8 Iron','9 Iron','Pitching Wedge','Gap Wedge','52° Wedge','56° Wedge','60° Wedge','Putter'];
const CLUB_ABBR={'Driver':'Dr','3 Wood':'3W','2 Iron':'2i','4 Iron':'4i','5 Iron':'5i','6 Iron':'6i','7 Iron':'7i','8 Iron':'8i','9 Iron':'9i','Pitching Wedge':'PW','Gap Wedge':'GW','52° Wedge':'52°','56° Wedge':'56°','60° Wedge':'60°','Putter':'Pt'};
// canonical bag — every club shows in the bag view even before it has shot data
const BAG=[...CLUB_ORDER];
// map common launch-monitor club-type names onto the canonical bag
const CLUB_ALIASES={
  'driver':'Driver','3 wood':'3 Wood','three wood':'3 Wood','3w':'3 Wood',
  '2 iron':'2 Iron','4 iron':'4 Iron','5 iron':'5 Iron','6 iron':'6 Iron','7 iron':'7 Iron','8 iron':'8 Iron','9 iron':'9 Iron',
  'pitching wedge':'Pitching Wedge','pw':'Pitching Wedge','wedge':'Pitching Wedge',
  'gap wedge':'Gap Wedge','gw':'Gap Wedge','approach wedge':'Gap Wedge','aw':'Gap Wedge',
  'sand wedge':'56° Wedge','sw':'56° Wedge',           // default a generic SW to the 56°
  'lob wedge':'60° Wedge','lw':'60° Wedge',             // default a generic LW to the 60°
  '50 degree':'Gap Wedge','52 degree':'52° Wedge','54 degree':'52° Wedge',
  '56 degree':'56° Wedge','58 degree':'56° Wedge','60 degree':'60° Wedge',
  '52°':'52° Wedge','56°':'56° Wedge','60°':'60° Wedge','putter':'Putter'
};
function canonicalClub(name){
  if(!name) return null;
  const k=name.trim().toLowerCase().replace(/\s+/g,' ');
  if(CLUB_ALIASES[k]) return CLUB_ALIASES[k];
  // tolerant degree match e.g. "60° Sand Wedge", "Vokey 56", "SM9 58"
  const deg=k.match(/(\d{2})\s*(?:°|deg|degree)?/);
  if(deg){ const d=+deg[1]; if(d>=48&&d<=64){ if(d<=50)return'Gap Wedge'; if(d<=53)return'52° Wedge'; if(d<=58)return'56° Wedge'; return'60° Wedge'; } }
  // title-case fallback so unknown clubs still track
  return name.trim().replace(/\b\w/g,c=>c.toUpperCase());
}
function golf(){ return DB.golf||{shots:[],rounds:[]}; }
function clubsWithData(){ return [...new Set(golf().shots.map(s=>s.club))]; }
function clubsInBag(){
  // union of canonical bag + any extra clubs that have data, sorted by bag order
  const extra=clubsWithData().filter(c=>!BAG.includes(c));
  return [...BAG, ...extra].sort((a,b)=>{
    const ia=CLUB_ORDER.indexOf(a), ib=CLUB_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
}
/* Scratch (0-handicap) benchmark reference — carry in METRES, clubhead speed in mph.
   Carry figures converted from widely-published scratch/low-single-figure yardages
   (Shot Scope / Trackman scratch tier). Clubhead speed anchored to Trackman scratch
   values (driver ~94, 6i ~80, PW ~72) interpolated across the bag. Dispersion target
   is the lateral carry spread (±m) a scratch player typically holds per club. */
const SCRATCH={
  'Driver':       {carry:251, chs:113, disp:13},
  '3 Wood':       {carry:224, chs:107, disp:12},
  '2 Iron':       {carry:201, chs:98,  disp:11},
  '4 Iron':       {carry:188, chs:90,  disp:10},
  '5 Iron':       {carry:178, chs:88,  disp:9},
  '6 Iron':       {carry:167, chs:85,  disp:8.5},
  '7 Iron':       {carry:155, chs:82,  disp:8},
  '8 Iron':       {carry:143, chs:78,  disp:7},
  '9 Iron':       {carry:130, chs:75,  disp:6.5},
  'Pitching Wedge':{carry:117,chs:72,  disp:6},
  'Gap Wedge':    {carry:104, chs:68,  disp:5.5},
  '52° Wedge':    {carry:95,  chs:64,  disp:5},
  '56° Wedge':    {carry:82,  chs:60,  disp:4.5},
  '60° Wedge':    {carry:68,  chs:56,  disp:4}
};
// robust clubhead speed: launch monitors emit junk CHS readings, so use a filtered
// median that rejects values outside a plausible band relative to the club's ball speed.
/* ---- Outlier rejection (IQR fences). Removes mishits/junk before any stat. ---- */
function rejectOutliers(vals){
  const v=vals.filter(x=>x!=null&&isFinite(x));
  if(v.length<4) return v;                       // too few to fence
  const s=v.slice().sort((a,b)=>a-b);
  const q=p=>{const i=(s.length-1)*p, lo=Math.floor(i), hi=Math.ceil(i); return s[lo]+(s[hi]-s[lo])*(i-lo);};
  const q1=q(0.25), q3=q(0.75), iqr=q3-q1;
  const lo=q1-1.5*iqr, hi=q3+1.5*iqr;
  return v.filter(x=>x>=lo&&x<=hi);
}
function meanOf(a){ return a.length? a.reduce((s,x)=>s+x,0)/a.length : null; }
function sdOf(a){ if(a.length<2)return null; const m=meanOf(a); return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1)); }

function robustClubSpeed(shots){
  // launch monitors emit junk CHS readings; the reliable discriminator is smash factor
  // (ballSpeed/clubSpeed). A genuine iron/wedge strike sits ~1.20–1.55; driver ~1.40–1.52.
  const sane=shots.filter(s=>s.clubSpeed!=null&&s.clubSpeed>50&&s.clubSpeed<135&&s.ballSpeed!=null)
    .filter(s=>{const sm=s.ballSpeed/s.clubSpeed; return sm>=1.15&&sm<=1.55;})
    .map(s=>s.clubSpeed);
  const loose=shots.map(s=>s.clubSpeed).filter(v=>v!=null&&v>50&&v<135);
  const use=rejectOutliers(sane.length>=3?sane:loose);
  if(!use.length) return null;
  const sorted=use.slice().sort((a,b)=>a-b);
  const mid=Math.floor(sorted.length/2);
  return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2; // median
}

/* ---- SEPARATE distance & accuracy scores vs scratch (each 0-100) ---- */
function distanceScore(club,avgCarry){
  const ref=SCRATCH[club]; if(!ref||avgCarry==null) return null;
  return Math.round(Math.max(0,Math.min(100,(avgCarry/ref.carry)*100)));
}
function accuracyScore(club,latSd){
  const ref=SCRATCH[club]; if(!ref||latSd==null) return null;
  return Math.round(Math.max(0,Math.min(100,(ref.disp/Math.max(latSd,0.1))*100)));
}
function scoreColor(s){ return s==null?'var(--ink-faint)': s>=90?'var(--good)': s>=70?'var(--sky)': s>=50?'var(--gold)':'var(--bad)'; }
function scoreLabel(s){ return s==null?'—': s>=90?'scratch+': s>=70?'strong': s>=50?'developing':'work zone'; }

/* ---- Expert coaching commentary per club ---- */
function sessionStats(shots){
  const carry=rejectOutliers(shots.map(s=>s.carry).filter(v=>v!=null));
  const total=rejectOutliers(shots.map(s=>s.total).filter(v=>v!=null));
  const dev=rejectOutliers(shots.map(s=>s.carryDev).filter(v=>v!=null));
  const smash=rejectOutliers(shots.map(s=>s.smash).filter(v=>v!=null));
  return {
    n:shots.length,
    avgCarry:meanOf(carry), avgTotal:meanOf(total),
    bestTotal:total.length?Math.max(...total):null, bestCarry:carry.length?Math.max(...carry):null,
    sd:sdOf(dev), carrySd:sdOf(carry), avgSmash:meanOf(smash), chs:robustClubSpeed(shots)
  };
}
function delta(cur,prev,opt){
  opt=opt||{}; if(cur==null||prev==null) return null;
  const d=cur-prev; const better = opt.lowerIsBetter ? d<0 : d>0;
  const flat=Math.abs(d) < (opt.flatBand||0);
  return {d, better, flat, dir: flat?'\u2192':(d>0?'\u2191':'\u2193')};
}

function clubCommentary(club,a){
  const ref=SCRATCH[club]; if(!a||a.n===0) return [];
  const notes=[]; const L=a.last, P=a.prev;
  if(!L) return [{tag:'Data',tone:'watch',text:'No clean session data yet for this club.'}];

  if(L.sd!=null){
    const dd=P&&P.sd!=null?delta(L.sd,P.sd,{lowerIsBetter:true,flatBand:0.5}):null;
    const vsScratch = ref? (L.sd<=ref.disp?'inside':L.sd<=ref.disp*1.6?'near':'outside') : null;
    let tone = vsScratch==='inside'?'good':vsScratch==='near'?'watch':'bad';
    let txt = `Last session dispersion was \u00b1${L.sd.toFixed(1)} m`;
    if(ref) txt += ` (scratch holds \u00b1${ref.disp} m)`;
    if(dd){
      if(dd.flat) txt += `, essentially unchanged from the session before \u2014 you've plateaued here. To move it, shrink your target: pick a smaller start-line window and commit to it.`;
      else if(dd.better){ txt += `, tightening from \u00b1${P.sd.toFixed(1)} m last time \u2014 ${Math.abs(dd.d).toFixed(1)} m less spread. That's real progress; whatever you changed, bank it.`; tone = tone==='bad'?'watch':'good'; }
      else { txt += `, wider than the \u00b1${P.sd.toFixed(1)} m you held previously. Spread crept up ${Math.abs(dd.d).toFixed(1)} m \u2014 check whether you were swinging full-tilt rather than controlled.`; tone='bad'; }
    } else {
      txt += vsScratch==='inside'?` \u2014 already tighter than scratch. Log another session so we can confirm it holds.`:` \u2014 this is your baseline. One more session and we'll see the direction of travel.`;
    }
    notes.push({tag:'Accuracy',tone,text:txt});
  }

  if(L.avgSmash!=null){
    const ideal = club==='Driver'?1.48: /Wedge/.test(club)?1.25:1.38;
    const dd=P&&P.avgSmash!=null?delta(L.avgSmash,P.avgSmash,{flatBand:0.02}):null;
    let tone = L.avgSmash>=ideal-0.04?'good':'watch';
    let txt = `Smash factor ${L.avgSmash.toFixed(2)} (ideal ~${ideal.toFixed(2)})`;
    if(dd){
      if(dd.flat) txt += `, holding steady. Contact is repeatable; if it's below ideal, a strike drill \u2014 foot-spray to expose heel/toe bias \u2014 is the next lever.`;
      else if(dd.better){ txt += `, up from ${P.avgSmash.toFixed(2)} \u2014 finding the centre more often. Strike is trending the right way.`; tone='good'; }
      else { txt += `, down from ${P.avgSmash.toFixed(2)} \u2014 contact slipped off-centre. Check ball position, and whether fatigue crept in late in the bucket.`; tone='watch'; }
    } else {
      txt += L.avgSmash>=ideal-0.04?` \u2014 clean centre-face contact.`:` \u2014 a touch low, suggesting off-centre strikes. Foot-spray will show the pattern.`;
    }
    notes.push({tag:'Strike',tone,text:txt});
  }

  if(L.carrySd!=null){
    const dd=P&&P.carrySd!=null?delta(L.carrySd,P.carrySd,{lowerIsBetter:true,flatBand:1}):null;
    let tone = L.carrySd<=6?'good':L.carrySd<=10?'watch':'bad';
    let txt = `Carry varied \u00b1${L.carrySd.toFixed(1)} m shot-to-shot this session`;
    if(dd){
      if(dd.flat) txt += ` \u2014 about the same as last time. A repeatable number is what lets you club confidently on course.`;
      else if(dd.better){ txt += `, tighter than the \u00b1${P.carrySd.toFixed(1)} m before \u2014 distance control is firming up.`; tone = tone==='bad'?'watch':'good'; }
      else { txt += `, more scattered than the \u00b1${P.carrySd.toFixed(1)} m before \u2014 a few flyers or duffs in the mix. Check the shot table for the outliers.`; }
    } else {
      txt += `. ${L.carrySd<=6?'Tight grouping \u2014 you can trust this yardage.':'Some scatter; tightening this makes on-course club selection far easier.'}`;
    }
    notes.push({tag:'Consistency',tone,text:txt});
  }

  if(L.avgTotal!=null){
    const dd=P&&P.avgTotal!=null?delta(L.avgTotal,P.avgTotal,{flatBand:2}):null;
    let txt = `Averaging ${L.avgTotal.toFixed(0)} m total (${L.avgCarry?L.avgCarry.toFixed(0):'\u2014'} m carry)`;
    let tone='good';
    if(dd && !dd.flat){ txt += dd.better?`, up ${Math.abs(dd.d).toFixed(0)} m on last session.`:`, down ${Math.abs(dd.d).toFixed(0)} m on last session \u2014 if accuracy improved, a small distance trade is fine.`; }
    else if(ref){ const gap=L.avgCarry-ref.carry; txt += gap>=-5?` \u2014 around the scratch benchmark. Plenty of length; keep the focus on control.`:` \u2014 ${Math.abs(gap).toFixed(0)} m under scratch carry, but distance isn't your priority. Leave it.`; }
    notes.push({tag:'Distance',tone,text:txt});
  }
  return notes;
}

function clubAgg(club){
  const sh=golf().shots.filter(s=>s.club===club);
  const byDate={};
  sh.forEach(s=>{ const d=(s.date||'').slice(0,10)||'undated'; (byDate[d]=byDate[d]||[]).push(s); });
  const sessionList=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0]))
    .map(([date,shots])=>({date,shots,stats:sessionStats(shots)}));
  const last = sessionList[0]?sessionList[0].stats:null;
  const prev = sessionList[1]?sessionList[1].stats:null;
  const allCarry=rejectOutliers(sh.map(s=>s.carry).filter(v=>v!=null));
  const allTotal=rejectOutliers(sh.map(s=>s.total).filter(v=>v!=null));
  const allDev=rejectOutliers(sh.map(s=>s.carryDev).filter(v=>v!=null));
  const allTime={avgTotal:meanOf(allTotal),avgCarry:meanOf(allCarry),sd:sdOf(allDev),bestTotal:allTotal.length?Math.max(...allTotal):null};
  const a={
    n:sh.length, sessions:sessionList.length, sessionList, last, prev, allTime,
    avgTotal: last?last.avgTotal:null, avgCarry: last?last.avgCarry:null,
    sd: last?last.sd:null, chs: last?last.chs:null, avgSmash: last?last.avgSmash:null,
    bestTotal: last?last.bestTotal:null, carrySd: last?last.carrySd:null,
    lastDate: sessionList[0]?sessionList[0].date:null,
    distScore: last?distanceScore(club,last.avgCarry):null,
    accScore: last?accuracyScore(club,last.sd):null,
    dCarry: delta(last&&last.avgTotal,prev&&prev.avgTotal,{flatBand:2}),
    dSd: delta(last&&last.sd,prev&&prev.sd,{lowerIsBetter:true,flatBand:0.5}),
    dSmash: delta(last&&last.avgSmash,prev&&prev.avgSmash,{flatBand:0.02})
  };
  a.commentary=clubCommentary(club,a);
  return a;
}

function asDrawAnnotation(canvas, lines) {
  if (!canvas || !lines || !lines.length) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  lines.forEach(ln => {
    if (!ln.fromPct || !ln.toPct) return;
    const x1 = ln.fromPct[0]/100*W, y1 = ln.fromPct[1]/100*H;
    const x2 = ln.toPct[0]/100*W,   y2 = ln.toPct[1]/100*H;
    ctx.save();
    ctx.strokeStyle = ln.color || '#2563EB';
    ctx.lineWidth = Math.max(3, W/80);
    ctx.setLineDash(ln.dashed !== false ? [9,5] : []);
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    // arrow
    const ang = Math.atan2(y2-y1, x2-x1), aLen = Math.max(12,W/50);
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-aLen*Math.cos(ang-0.45), y2-aLen*Math.sin(ang-0.45));
    ctx.lineTo(x2-aLen*Math.cos(ang+0.45), y2-aLen*Math.sin(ang+0.45));
    ctx.closePath(); ctx.fillStyle = ln.color||'#2563EB'; ctx.fill();
    // label with dark shadow for legibility on any background
    if (ln.label) {
      const lx = x1+(x2-x1)*0.3, ly = y1+(y2-y1)*0.3;
      const fs = Math.max(12, W/30);
      ctx.font = `bold ${fs}px monospace`;
      ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=6;
      ctx.fillStyle = '#000'; ctx.fillText(ln.label, lx+1.5, ly-4);
      ctx.shadowBlur=0;
      ctx.fillStyle = ln.color||'#2563EB'; ctx.fillText(ln.label, lx, ly-5);
    }
    ctx.restore();
  });
}

function asPopulateCanvas(posId, frame, ann) {
  const canvas = document.getElementById('asc-'+posId);
  if (!canvas || !frame) return;
  const img = new Image();
  img.onload = () => {
    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    if (ann && ann.lines && ann.lines.length) asDrawAnnotation(canvas, ann.lines);
  };
  img.src = 'data:image/jpeg;base64,' + frame;
}

function asGetFrame(idx) {
  const g = golf();
  const last = (g.swings||[]).sort((a,b)=>(b.at||0)-(a.at||0))[0]||null;
  const kf = last ? (last.keyFrames||[]) : [];
  const liveF = _swing && (_swing.keyFrames||[]).length ? _swing.keyFrames : null;
  return liveF ? liveF[idx]||null : kf[idx]||null;
}

async function annotateAllPositions() {
  const base = proxyBase(); if (!base) { toast('Connect your proxy first.'); return; }
  if (_annotating) { toast('Analysis already running…'); return; }
  const hasAny = SWING_POSITIONS.some((_,i) => asGetFrame(i));
  if (!hasAny) { toast('Upload a swing video first — use the Swing Review button.'); return; }
  _annotating = true;
  const btn = document.getElementById('as-analyse-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Analysing…'; }
  toast('Drawing coaching lines on each position — takes about a minute…');
  let done = 0;
  for (let i = 0; i < SWING_POSITIONS.length; i++) {
    const pos = SWING_POSITIONS[i];
    const frame = asGetFrame(i);
    if (!frame) continue;
    try {
      const r = await fetch(base+'/swing/annotate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ image: frame, position: pos.label })
      });
      const ann = await r.json();
      if (ann && ann.visible !== false && ann.lines && ann.lines.length) {
        _asAnnotations[pos.id] = ann;
        asPopulateCanvas(pos.id, frame, ann);
        const noteEl = document.getElementById('asnote-'+pos.id);
        if (noteEl && ann.note) { noteEl.textContent = ann.note; noteEl.style.display=''; }
        done++;
      }
    } catch(e) { console.log('[AS-ANN]', pos.id, e.message); }
  }
  _annotating = false;
  if (btn) { btn.disabled = false; btn.textContent = 'Re-analyse'; }
  toast(done > 0 ? `Coaching lines drawn on ${done} positions` : 'Analysis failed — make sure your video uploaded successfully.');
}

/* ============================================================
   SWING REVIEW — upload a swing video, extract frames in-browser,
   and chat with Coach about it. Claude can't take video directly, so
   we sample evenly-spaced frames via a <video>+<canvas> and send them
   as an ordered image sequence to POST /swing. The thread stays open
   for follow-up questions. Reviews are saved (text only) to DB.golf.swings.
   ============================================================ */
let _swing = null; // { frames:[base64], messages:[{role,content}], view, handed, thumb }

function golfSwings(){ const g=golf(); if(!Array.isArray(g.swings)) g.swings=[]; return g.swings; }

/* ── SWING REVIEW: multi-step manual position marking ─────────────────── */
const MARK_POS = [
  { id:'address',       label:'Address',         desc:'Golfer fully still at setup, just before the swing begins.' },
  { id:'halfway',       label:'Halfway Back',     desc:'Club at hip height on the backswing — lead arm roughly parallel to the ground.' },
  { id:'top',           label:'Top of Backswing', desc:'Club at its highest point — fully loaded, maximum shoulder turn.' },
  { id:'impact',        label:'Impact',           desc:'The exact moment the club strikes the ball.' },
  { id:'followthrough', label:'Follow-Through',   desc:'Club at hip height on the target side after impact.' },
  { id:'finish',        label:'Finish',           desc:'Fully balanced finish position — weight on lead foot, hands high.' }
];
let _markState = null; // { file, angle, handed, club, videoEl, marked:{}, currentIdx }

function openSwingReview(){

            <div style="font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)">${fmtDate(new Date(s.at).toISOString())}${s.view?' · '+s.view:''}</div></div>
          <div style="display:flex;gap:6px;flex-none"><button class="btn" style="padding:6px 10px;font-size:12px" onclick="viewSavedSwing('${s.id}')">Open</button>
            <button class="cf-x" title="Delete" onclick="delSavedSwing('${s.id}')">×</button></div>
        </div>`).join('')}</div>`
    : '';

  showModal(`<div class="modal-head">
    <div><h2>Swing review</h2><div class="ms">Step 1 — choose angle and club, then upload your video</div></div>
    <button class="x" onclick="closeModal()">${xSvg()}</button></div>
  <div class="modal-body">
    ${savedHtml}
    <div class="grid g3" style="margin-bottom:18px;gap:10px">
      <div class="field"><label>Camera angle <span style="color:var(--bad)">*</span></label>
        <select id="sw_view" style="font-weight:600">
          <option value="">Choose…</option>
          <option value="face-on">Face-on</option>
          <option value="down-the-line">Down-the-line</option>
        </select></div>
      <div class="field"><label>Handed</label>
        <select id="sw_hand"><option value="right">Right</option><option value="left">Left</option></select></div>

    </div>
    <div class="dz" id="swdz" onclick="swStartUpload()">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--terra)" stroke-width="1.5" style="margin-bottom:10px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <div class="dz-t">Tap to choose your swing video</div>
      <div class="dz-s">MP4 · MOV · WEBM &nbsp;·&nbsp; a single swing, a few seconds</div>

function swStartUpload(){
  const view = document.getElementById('sw_view').value;
  if(!view){ toast('Please choose a camera angle first (Face-on or Down-the-line).'); return; }
  document.getElementById('swVid').click();
}

function swVideoChosen(file){
  if(!file) return;
  const view = document.getElementById('sw_view').value;
  if(!view){ toast('Please choose a camera angle first.'); return; }
  const handed = document.getElementById('sw_hand').value;
  const club = (document.getElementById('sw_club').value||'').trim();

  // Load video into a hidden element, then start the marking flow
  const videoEl = document.createElement('video');
  videoEl.src = URL.createObjectURL(file);
  videoEl.muted = true; videoEl.playsInline = true;
  videoEl.setAttribute('playsinline',''); videoEl.setAttribute('muted','');
  videoEl.preload = 'auto';

  _markState = { file, angle:view, handed, club, videoEl, marked:{}, currentIdx:0 };

  videoEl.onloadedmetadata = () => {
    swShowMarkStep(0);
  };
  videoEl.onerror = () => toast('Could not load video — try MP4 or MOV (H.264).');
  videoEl.load();
}

function swShowMarkStep(idx){
  const st = _markState; if(!st) return;
  const pos = MARK_POS[idx];
  const total = MARK_POS.length;
  const dur = st.videoEl.duration || 0;
  const markedCount = Object.keys(st.marked).length;

  // Progress dots
  const dots = MARK_POS.map((p,i)=>{
    const done = !!st.marked[p.id];
    const cur  = i === idx;
    return `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 3px;
      background:${done?'var(--good)':cur?'var(--terra)':'var(--line2)'}"></span>`;
  }).join('');

  showModal(`<div class="modal-head">
    <div><h2>${pos.label}</h2><div class="ms">Step ${idx+2} of ${total+1} · ${st.angle === 'face-on' ? 'Face-on' : 'DTL'} · ${st.club||'swing'}</div></div>
    <button class="x" onclick="closeModal()">${xSvg()}</button></div>
  <div class="modal-body" style="padding-bottom:10px">
    <div style="text-align:center;margin-bottom:12px">${dots}</div>
    <div style="font-family:var(--serif);font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:14px;padding:10px 12px;background:var(--paper2);border-radius:9px;border-left:3px solid var(--terra)">
      <b>${pos.label}:</b> ${pos.desc}</div>
    <canvas id="sw-mark-canvas" style="width:100%;display:block;border-radius:9px;border:1px solid var(--line2);background:#111;max-height:320px;object-fit:contain"></canvas>
    <div style="margin:12px 0 8px">
      <input type="range" id="sw-scrub" min="0" max="${dur.toFixed(3)}" step="0.001" value="0"
        style="width:100%;accent-color:var(--terra)" oninput="swSeek(this.value)">
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-faint)">
        <span id="sw-time">0.000s</span><span>${dur.toFixed(2)}s</span></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn" onclick="swStep(-10)" title="-10 frames">«</button>
      <button class="btn" onclick="swStep(-1)" title="-1 frame">‹</button>
      <button class="btn" onclick="swStep(1)"  title="+1 frame">›</button>
      <button class="btn" onclick="swStep(10)" title="+10 frames">»</button>
    </div>
    <button class="btn primary" onclick="swMarkFrame(${idx})" style="width:100%;margin-bottom:10px;font-size:15px;padding:13px">
      ✓ Mark as "${pos.label}"
    </button>
    <div style="display:flex;gap:10px">
      ${idx > 0 ? `<button class="btn" onclick="swShowMarkStep(${idx-1})" style="flex:1">← Back</button>` : ''}
      <button class="btn" onclick="swSkipPosition(${idx})" style="flex:1;color:var(--ink-faint)">Skip this position</button>
      ${markedCount >= 3 && idx === total-1 ? `<button class="btn primary" onclick="swFinishMarking()" style="flex:1">Finish →</button>` : ''}
    </div>
  </div>`);

  // Wire up the video element to seek and draw to canvas
  setTimeout(()=>{
    const canvas = document.getElementById('sw-mark-canvas');
    const scrub  = document.getElementById('sw-scrub');
    if(!canvas || !scrub) return;
    // Set canvas size from video metadata
    const vw = st.videoEl.videoWidth || 480;
    const vh = st.videoEl.videoHeight || 640;
    canvas.width  = vw;
    canvas.height = vh;
    // Draw current frame
    swDrawFrame();
    // If we already have a marked time for this position, seek there
    if(st.marked[pos.id] != null){
      st.videoEl.currentTime = st.marked[pos.id].time;
      scrub.value = st.marked[pos.id].time;
    }
    st.videoEl.onseeked = () => { swDrawFrame(); };
  }, 80);
}

function swDrawFrame(){
  const canvas = document.getElementById('sw-mark-canvas');
  const timeEl = document.getElementById('sw-time');
  const scrub  = document.getElementById('sw-scrub');
  if(!canvas || !_markState) return;
  const v = _markState.videoEl;
  const ctx = canvas.getContext('2d');
  try { ctx.drawImage(v, 0, 0, canvas.width, canvas.height); } catch(e){}
  if(timeEl) timeEl.textContent = v.currentTime.toFixed(3) + 's';
  if(scrub) scrub.value = v.currentTime;
}

function swSeek(t){
  if(!_markState) return;
  _markState.videoEl.currentTime = parseFloat(t);
}

function swStep(frames){
  if(!_markState) return;
  const fps = 60;
  const v = _markState.videoEl;
  v.currentTime = Math.max(0, Math.min(v.duration, v.currentTime + frames/fps));
}

function swMarkFrame(idx){
  const st = _markState; if(!st) return;
  const canvas = document.getElementById('sw-mark-canvas');
  if(!canvas){ toast('Video not ready — wait a moment and try again.'); return; }
  const v = st.videoEl;
  // Capture the current canvas contents as JPEG
  const frame = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  const pos = MARK_POS[idx];
  st.marked[pos.id] = { time: v.currentTime, frame };
  toast(`✓ ${pos.label} marked at ${v.currentTime.toFixed(2)}s`);

  // Advance to next position, or finish if last
  const next = idx + 1;
  if(next < MARK_POS.length){
    swShowMarkStep(next);
  } else {
    swFinishMarking();
  }
}

function swSkipPosition(idx){
  const next = idx + 1;
  if(next < MARK_POS.length) swShowMarkStep(next);
  else swFinishMarking();
}

function swFinishMarking(){
  const st = _markState; if(!st) return;
  const markedPos = MARK_POS.filter(p => st.marked[p.id]);
  if(markedPos.length < 2){ toast('Mark at least 2 positions to save a review.'); return; }

  // Build keyFrames array in the fixed order
  const keyFrames = MARK_POS.map(p => st.marked[p.id] ? st.marked[p.id].frame : null);

  // Set up _swing with the manually-marked frames
  _swing = {
    frames: Object.values(st.marked).map(m=>m.frame),
    keyFrames,
    messages: [],
    view: st.angle,
    handed: st.handed,
    club: st.club,
    thumb: st.marked.impact ? st.marked.impact.frame : (markedPos[0] && st.marked[markedPos[0].id].frame),
    title: (st.club ? st.club + ' swing' : 'Swing review')
  };
  if(st.club) _swing.messages.push({role:'user', content:'This is my '+st.club+'.'});
  saveSwing();
  URL.revokeObjectURL(st.videoEl.src);

  // Show review summary + Coach chat
  const frameGrid = MARK_POS.map(p=>{
    const m = st.marked[p.id];
    return `<div style="text-align:center">
      ${m ? `<img src="data:image/jpeg;base64,${m.frame}" style="height:72px;border-radius:7px;border:2px solid var(--good)">
        <div style="font-family:var(--mono);font-size:8px;color:var(--good);margin-top:3px">${p.label}</div>`
        : `<div style="height:72px;border-radius:7px;border:2px dashed var(--line2);display:flex;align-items:center;justify-content:center">
          <span style="font-family:var(--mono);font-size:8px;color:var(--line2)">skipped</span></div>
          <div style="font-family:var(--mono);font-size:8px;color:var(--line2);margin-top:3px">${p.label}</div>`}
    </div>`;
  }).join('');

  showModal(`<div class="modal-head">
    <div><h2>Positions marked</h2><div class="ms">${markedPos.length} of ${MARK_POS.length} captured · Coach reviewing…</div></div>
    <button class="x" onclick="closeModal()">${xSvg()}</button></div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${frameGrid}</div>
    <div id="swChat" class="sw-chat" style="max-height:38vh;overflow-y:auto"></div>
    <div id="swStatus" style="font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:13px;margin:8px 0">Coach is reviewing your marked positions…</div>
    <div style="display:flex;gap:9px;margin-top:10px">
      <input id="swMsg" placeholder="Ask a follow-up…" style="flex:1;background:var(--paper);border:1px solid var(--line2);border-radius:11px;padding:11px 13px;font-family:var(--serif);font-size:14px;color:var(--ink)" onkeydown="if(event.key==='Enter')sendSwingMsg()" disabled>
      <button class="btn primary" id="swSendBtn" onclick="sendSwingMsg()" disabled>Send</button>
    </div>
  </div>`);

  // Trigger Coach review
  runSwingReview(true);
  // Re-render golf to update the comparison cards
  if(document.getElementById('pane-golf').classList.contains('active')||true) renderGolf();
}


// Extract N evenly-spaced frames from a video file, resized, as base64 jpegs
async function extractSwingFrames(file, count, maxPx){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const video=document.createElement('video');
    video.preload='auto'; video.muted=true; video.playsInline=true;
    video.setAttribute('playsinline',''); video.setAttribute('muted','');
    const frames=[]; let times=[]; let idx=0; let done=false;
    const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
    let seekTimer=null;
    const cleanup=()=>{ clearTimeout(global); clearTimeout(seekTimer); try{video.removeAttribute('src');video.load();}catch(e){} URL.revokeObjectURL(url); };
    const finish=()=>{ if(done)return; done=true; cleanup(); resolve(frames); };
    const fail=m=>{ if(done)return; done=true; cleanup(); reject(new Error(m)); };
    // Global watchdog — never let the UI hang. Return whatever we have, or error.
    const global=setTimeout(()=>{ if(frames.length>=2) finish(); else fail('That video took too long to read — it may be an unsupported format (e.g. HEVC/H.265). Try exporting/recording as H.264 MP4, or screen-record it.'); }, 25000);

    video.onerror=()=>fail('Could not read that video format. Try an H.264 MP4 or MOV.');
    function begin(){
      const dur=video.duration;
      if(!dur||!isFinite(dur)||dur<=0){ return fail('Could not read the video length. Try a different format (H.264 MP4 works best).'); }
      if(!video.videoWidth||!video.videoHeight){ return fail('Could not read the video dimensions — the format may be unsupported. Try an H.264 MP4.'); }
      const a=dur*0.05, b=dur*0.98;
      times=Array.from({length:count},(_,i)=>a+(b-a)*(i/(count-1)));
      const scale=Math.min(1, maxPx/Math.max(video.videoWidth,video.videoHeight));
      canvas.width=Math.round(video.videoWidth*scale); canvas.height=Math.round(video.videoHeight*scale);
      seek();
    }
    video.onloadedmetadata=begin;
    // Some browsers fire loadeddata but not loadedmetadata reliably for certain files
    video.onloadeddata=()=>{ if(!times.length && video.readyState>=1 && video.duration) begin(); };

    function seek(){
      if(done) return;
      if(idx>=times.length){ return finish(); }
      clearTimeout(seekTimer);
      // Per-seek watchdog: if onseeked never fires, capture what's there and move on
      seekTimer=setTimeout(()=>{ capture(true); }, 4000);
      try{ video.currentTime=times[idx]; }catch(e){ capture(true); }
    }
    function capture(skipOnStall){
      if(done) return;
      clearTimeout(seekTimer);
      try{
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const data=canvas.toDataURL('image/jpeg',0.8).split(',')[1];
        if(data && data.length>100) frames.push(data);
      }catch(e){ if(!skipOnStall) return fail('Could not capture a frame from the video.'); }
      idx++; setTimeout(seek,40);
    }
    video.onseeked=()=>capture(false);

    video.src=url;
    // Nudge load on browsers that wait for interaction
    try{ video.load(); }catch(e){}
  });
}

async function handleSwingVideo(file){
  if(!file) return;
  const base=proxyBase();
  const area=document.getElementById('swArea');
  if(!base){ area.innerHTML=`<div style="margin-top:16px;color:var(--bad);font-family:var(--mono);font-size:13px">Connect your proxy first.</div>`; return; }

  area.innerHTML=`<div style="margin-top:16px;font-family:var(--serif);font-style:italic;color:var(--ink-faint)">Extracting frames from your swing…</div>`;
  let allFrames;
  try{ allFrames=await extractSwingFrames(file, 15, 640); }
  catch(e){ area.innerHTML=`<div style="margin-top:16px;color:var(--bad);font-family:var(--mono);font-size:13px">⚠ ${e.message}</div>`; return; }
  if(!allFrames.length){ area.innerHTML=`<div style="margin-top:16px;color:var(--bad);font-family:var(--mono);font-size:13px">No frames could be read.</div>`; return; }

  area.innerHTML=`<div style="margin-top:16px;font-family:var(--serif);font-style:italic;color:var(--ink-faint)">Identifying key positions (address, top, impact, finish)…</div>`;

  // Build a contact sheet: 5 cols × 3 rows of small thumbnails, numbered
  let keyIndices = null;
  try {
    const cols=5, rows=3, tw=160, th=120;
    const sheet=document.createElement('canvas');
    sheet.width=tw*cols; sheet.height=th*rows;
    const ctx=sheet.getContext('2d');
    ctx.fillStyle='#111'; ctx.fillRect(0,0,sheet.width,sheet.height);
    await Promise.all(allFrames.slice(0,cols*rows).map((f,i)=>new Promise(res=>{
      const img=new Image();
      img.onload=()=>{
        const c=i%cols,r=Math.floor(i/cols);
        ctx.drawImage(img,c*tw,r*th,tw,th);
        ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(c*tw,r*th,26,20);
        ctx.fillStyle='#fff'; ctx.font='bold 13px monospace';
        ctx.fillText(String(i),c*tw+4,r*th+15);
        res();
      };
      img.onerror=res;
      img.src='data:image/jpeg;base64,'+f;
    })));
    const sheetB64=sheet.toDataURL('image/jpeg',0.75).split(',')[1];
    const r=await fetch(base+'/vision',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:sheetB64,media_type:'image/jpeg',
        prompt:`These are ${Math.min(allFrames.length,15)} sequential frames from a golf swing video, numbered 0-${Math.min(allFrames.length,15)-1}, arranged in a ${rows}x${cols} grid (left-to-right, top-to-bottom). The golfer completes one full swing.

Identify which frame number best shows each key position. Return ONLY a JSON object with integer indices:
{"address":N,"halfway":N,"top":N,"impact":N,"followthrough":N,"finish":N}

- address: golfer at static setup before swing begins
- halfway: club at hip height on backswing (lead arm roughly parallel to ground)
- top: top of backswing (club at or near parallel, highest point)
- impact: moment of impact or nearest frame to it (hips open, hands forward)
- followthrough: just past impact, club swinging to target side at roughly hip height
- finish: full balanced finish (hands high, weight on lead foot)`})});
    const j=await r.json();
    const reply=(j.reply||'');
    const s=reply.indexOf('{'),e=reply.lastIndexOf('}');
    if(s>=0){ try{ keyIndices=JSON.parse(reply.slice(s,e+1)); }catch(ex){} }
  } catch(e){ console.log('[IDENTIFY] failed',e.message); }

  // Fall back to heuristic spacing if identification failed
  const N=allFrames.length;
  const idx = keyIndices ? {
    address: Math.min(Math.max(keyIndices.address||0,0),N-1),
    halfway: Math.min(Math.max(keyIndices.halfway||Math.floor(N*0.25),0),N-1),
    top:     Math.min(Math.max(keyIndices.top||Math.floor(N*0.45),0),N-1),
    impact:  Math.min(Math.max(keyIndices.impact||Math.floor(N*0.60),0),N-1),
    followthrough: Math.min(Math.max(keyIndices.followthrough||Math.floor(N*0.72),0),N-1),
    finish:  Math.min(Math.max(keyIndices.finish||Math.floor(N*0.90),0),N-1)
  } : {
    address:0, halfway:Math.floor(N*0.25), top:Math.floor(N*0.45),
    impact:Math.floor(N*0.60), followthrough:Math.floor(N*0.72), finish:Math.floor(N*0.90)
  };

  const keyFrames=[allFrames[idx.address],allFrames[idx.halfway],allFrames[idx.top],
    allFrames[idx.impact],allFrames[idx.followthrough],allFrames[idx.finish]];

  const view=document.getElementById('sw_view').value;
  const handed=document.getElementById('sw_hand').value;
  const club=(document.getElementById('sw_club').value||'').trim();
  _swing={ frames:allFrames, keyFrames, messages:[], view, handed, club,
    thumb:allFrames[idx.impact], title:(club?club+' swing':'Swing review') };
  if(club) _swing.messages.push({role:'user',content:'This is my '+club+'.'});

  const identified=keyIndices?'AI-identified key positions':'heuristic spacing';
  const strip=keyFrames.map((f,i)=>`<div style="text-align:center;flex:none">
    <img src="data:image/jpeg;base64,${f}" style="height:70px;border-radius:6px;border:2px solid var(--terra)">

  </div>`).join('');
  area.innerHTML=`
    <div style="margin-top:14px">
      <div class="kicker" style="margin-bottom:4px">6 key positions · ${identified}</div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px">${strip}</div>
      <div style="font-family:var(--serif);font-style:italic;font-size:12px;color:var(--ink-faint);margin-top:4px">These frames are saved for the Adam Scott comparison. You can also ask Coach to review them.</div>

      <button class="btn primary" id="swSendBtn" onclick="sendSwingMsg()" disabled>Send</button></div>`;
  runSwingReview(true);
}

function swPushMsg(role,text){

async function runSwingReview(initial){
  const base=proxyBase(); if(!base||!_swing) return;
  const status=document.getElementById('swStatus'); const inp=document.getElementById('swMsg'); const btn=document.getElementById('swSendBtn');
  if(status) status.style.display='';
  const ctl=new AbortController(); const to=setTimeout(()=>ctl.abort(), 90000);
  try{
    const body={ media_type:'image/jpeg', view:_swing.view, handed:_swing.handed, messages:_swing.messages };
    if(_swing.frames && _swing.frames.length) body.frames=_swing.frames; // stateless API: resend frames each live turn
    const r=await fetch(base+'/swing',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:ctl.signal});
    let j={}; try{ j=await r.json(); }catch(e){}
    if(!r.ok||j.error){ if(status){status.style.display='';status.textContent='Coach unavailable: '+(j.error||('HTTP '+r.status));} if(inp){inp.disabled=false;} if(btn){btn.disabled=false;} return; }
    const reply=j.reply||'(no reply)';
    _swing.messages.push({role:'assistant',content:reply});
    swPushMsg('bot',reply);
    if(status) status.style.display='none';
    if(inp){ inp.disabled=false; } if(btn){ btn.disabled=false; }
    saveSwing(); // persist the conversation
  }catch(e){
    const msg = e.name==='AbortError' ? 'Coach took too long to respond — please try again.' : 'Could not reach Coach (network). Try again.';
    if(status){status.style.display='';status.textContent=msg;}
    if(inp){inp.disabled=false;} if(btn){btn.disabled=false;}
  } finally { clearTimeout(to); }
}

async function sendSwingMsg(){
  const inp=document.getElementById('swMsg'); if(!inp||!_swing) return;
  const text=(inp.value||'').trim(); if(!text) return;
  inp.value=''; swPushMsg('user',text);
  _swing.messages.push({role:'user',content:text});
  const status=document.getElementById('swStatus'); if(status){ status.style.display=''; status.textContent='Coach is thinking…'; }
  await runSwingReview(false); // no new frames; Claude still has them in the thread's first turn... but stateless API -> resend
}

function saveSwing(){
  if(!_swing) return;
  const list=golfSwings();
  let rec=list.find(s=>s.id===_swing.id);
  if(!rec){ rec={ id:_swing.id||('sw'+Date.now()), at:Date.now() }; _swing.id=rec.id; list.unshift(rec); }
  rec.title=_swing.title; rec.view=_swing.view; rec.handed=_swing.handed; rec.club=_swing.club;
  rec.thumb=_swing.thumb; rec.messages=_swing.messages;
  // Store 6 key position frames so the Adam Scott comparison can show your actual positions
  // Mapped to: address(0), takeaway(1), halfway(3), top(4/5), impact(6), finish(8)
  const F=_swing.frames||[];
  if(F.length>=9) rec.keyFrames=[F[0],F[1],F[3],F[4],F[6],F[8]];

}

async function resizeImage(file, maxPx){
  return new Promise((resolve, reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('Could not read file'));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('Could not decode image'));
      img.onload=()=>{
        const scale=Math.min(1, maxPx/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.85);
        resolve({base64:dataUrl.split(',')[1], mediaType:'image/jpeg'});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  const {base64, mediaType} = await resizeImage(file, 1200);

  // We send to the Anthropic API directly (proxy just forwards)

      body: JSON.stringify({
        image: base64,
        media_type: mediaType,
        prompt: `This is a Garmin Golf scorecard screenshot or photo. Extract the round data and return ONLY a valid JSON object — no markdown, no code fences, no explanation, just raw JSON:
{
  "course": "full course name as shown",
  "date": "YYYY-MM-DD",
  "par": 72,
  "total": 81,

}
holes must be an array of 18 integers, front 9 first then back 9. If a field is not visible use null. Date must be YYYY-MM-DD format.`
      })
    });
    if(!resp.ok){ const t=await resp.text(); throw new Error('Vision API '+resp.status+': '+t.slice(0,120)); }
    const data=await resp.json();
    const text=(data.text||'').replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim();

function handleGolfCSV(file){
  if(!file)return; const reader=new FileReader();
  reader.onload=e=>{ try{
    let txt=e.target.result.replace(/^\uFEFF/,'');
    const lines=txt.split(/\r?\n/).filter(l=>l.trim());
    const header=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
    const idx={}; header.forEach((h,i)=>{ if(GOLF_CSV_MAP[h]!==undefined) idx[GOLF_CSV_MAP[h]]=i; });
    if(idx.carry===undefined && idx.clubRaw===undefined) throw new Error('Could not find Club Type / Carry Distance columns');
    let start=1; const r2=parseCSVLine(lines[1]||''); if(r2[idx.carry]&&/^\s*\[/.test(r2[idx.carry])) start=2;
    const shots=[];
    for(let i=start;i<lines.length;i++){
      const c=parseCSVLine(lines[i]);
      const rawClub=(c[idx.clubRaw]||c[idx.clubName]||'').trim();
      const carry=parseFloat(c[idx.carry]);
      if(!rawClub && isNaN(carry)) continue;
      const s={club:canonicalClub(rawClub)||'Unknown', _raw:rawClub};
      for(const k in idx){ if(k==='clubRaw'||k==='clubName')continue;
        const raw=(c[idx[k]]||'').trim();
        if(k==='date'){ s.date=raw||null; }
        else { const n=parseFloat(raw); s[k]=isNaN(n)?null:Math.round(n*100)/100; } }
      if(!s.club) continue;
      shots.push(s);
    }
    if(!shots.length) throw new Error('No shots found in file');
    window._pendingGolf=shots;
    const byClub={}; shots.forEach(s=>{(byClub[s.club]=byClub[s.club]||[]).push(s);});
    const rows=Object.entries(byClub).map(([club,arr])=>{
      const cy=arr.map(s=>s.carry).filter(v=>v!=null);
      const inBag=BAG.includes(club);
      const raws=[...new Set(arr.map(s=>s._raw))].join(', ');
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)">
        <select onchange="remapGolf('${raws.replace(/'/g,"")}',this.value)" style="font-family:var(--serif);font-size:13px;padding:5px 8px;border:1px solid var(--line2);border-radius:8px;background:var(--paper);color:var(--ink)">
          ${BAG.map(b=>`<option ${b===club?'selected':''}>${b}</option>`).join('')}
          ${inBag?'':`<option selected>${club}</option>`}
        </select>
        <span style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)">was “${raws}”</span>
        <span style="margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink-soft)">${arr.length} shots · ${cy.length?Math.round(mean(cy)):'—'} m avg</span>
      </div>`;
    }).join('');
    document.getElementById('gPreview').innerHTML=`
      <div style="margin-top:18px;padding:16px;background:var(--paper);border:1px solid var(--line2);border-radius:12px">
        <div style="font-family:var(--mono);font-size:11px;color:var(--good);letter-spacing:1px;margin-bottom:6px">✓ ${shots.length} shots · ${Object.keys(byClub).length} club${Object.keys(byClub).length>1?'s':''}</div>
        <div style="font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--ink-faint);margin-bottom:8px">Check the club mapping — adjust any dropdown if a club was matched wrong.</div>
        ${rows}
        <button class="btn primary" style="width:100%;justify-content:center;margin-top:14px" onclick="commitGolf()">Add to bag</button>
      </div>`;
  }catch(err){ document.getElementById('gPreview').innerHTML=`<div style="margin-top:16px;color:var(--bad);font-family:var(--mono);font-size:13px">⚠ ${err.message}</div>`; }
  };
  reader.readAsText(file);
}
function remapGolf(raws,newClub){
  const set=new Set(raws.split(', '));
  (window._pendingGolf||[]).forEach(s=>{ if(set.has(s._raw)) s.club=newClub; });
}
function commitGolf(){
  if(!window._pendingGolf)return;
  DB.golf=DB.golf||{shots:[],rounds:[]};
  const clean=window._pendingGolf.map(s=>{const {_raw,...rest}=s;return rest;});
  DB.golf.shots.push(...clean);
  const n=clean.length; window._pendingGolf=null;
  save(); closeModal(); renderGolf(); renderHome(); toast(`Added ${n} shots to your bag`);
}

/* ---- CLUB DETAIL popup: full session-by-session summary ---- */
function sessionsForClub(club){
  const byDate={};
  golf().shots.filter(s=>s.club===club).forEach(s=>{ const d=(s.date||'').slice(0,10)||'undated'; (byDate[d]=byDate[d]||[]).push(s); });
  return Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0]))
    .map(([date,shots])=>({date,shots}));
}
function statBlock(shots){
  const f=k=>shots.map(s=>s[k]).filter(v=>v!=null);
  const m=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  const sd=a=>{if(a.length<2)return null;const mm=m(a);return Math.sqrt(a.reduce((s,x)=>s+(x-mm)**2,0)/(a.length-1));};

  return {n:shots.length,avgCarry:m(carry),bestCarry:carry.length?Math.max(...carry):null,carrySd:sd(carry),

    avgSmash:m(smash),avgLaunch:m(launch),avgApex:m(apex),avgClubSpeed:m(cs)};
}

/* ============================================================
   WHOOP MODULE — live-sync-ready (proxy) + manual import
   ============================================================
   The WHOOP API cannot be called directly from a static file:
   it needs OAuth2 + a client_secret, which must live server-side.
   So this module talks to YOUR proxy (a small backend you host),
   never to WHOOP directly. Until the proxy exists, the same
   normalized shape can be filled via manual JSON import.

   Proxy contract (you build this — see WHOOP_PROXY folder):
     GET  {proxyUrl}/whoop/recovery?days=N   -> [{date,recovery,hrv,rhr,spo2,skinTemp}]
     GET  {proxyUrl}/whoop/sleep?days=N      -> [{date,performance,efficiency,consistency,
                                                  durationMs,remMs,swsMs,lightMs,awakeMs,respRate,disturbances}]
     GET  {proxyUrl}/whoop/workouts?days=N   -> [{date,sport,strain,avgHr,maxHr,kilojoule,distanceM,durationMs}]
     GET  {proxyUrl}/whoop/cycles?days=N     -> [{date,strain,avgHr,maxHr,kilojoule}]
     GET  {proxyUrl}/whoop/profile           -> {firstName,lastName,heightM,weightKg,maxHr}
   The proxy holds the secret, does the OAuth dance, and maps
   WHOOP's raw schema to these flat records. Mapping reference is
   embedded in the proxy server.js so it stays in one place.
*/
function whoopDB(){
  DB.whoop = DB.whoop || {};
  const w=DB.whoop;
  // ensure every field exists even if DB.whoop was pre-created (e.g. by reconcileConn setting only proxyUrl)
  if(w.proxyUrl==null) w.proxyUrl='';
  if(w.lastSync===undefined) w.lastSync=null;
  if(!Array.isArray(w.recovery)) w.recovery=[];
  if(!Array.isArray(w.sleep)) w.sleep=[];
  if(!Array.isArray(w.workouts)) w.workouts=[];
  if(!Array.isArray(w.cycles)) w.cycles=[];
  if(w.profile===undefined) w.profile=null;
  return w;
}

const msToH = ms => ms==null? null : ms/3600000;
const fmtDur = ms => { if(ms==null)return'—'; const h=Math.floor(ms/3600000), m=Math.round((ms%3600000)/60000); return `${h}h ${String(m).padStart(2,'0')}m`; };

/* ---- normalize: accept either our proxy's flat shape OR raw WHOOP API json ---- */
function normalizeWhoop(kind, raw){
  // If it's a raw WHOOP paginated response, unwrap .records
  const recs = Array.isArray(raw) ? raw : (raw && raw.records) ? raw.records : [];
  return recs.map(r=>{
    // already flat (from our proxy)?
    if(kind==='recovery'){
      if('recovery' in r || 'hrv' in r) return r;
      const s=r.score||{};
      return {date:(r.created_at||'').slice(0,10), recovery:s.recovery_score??null, hrv:s.hrv_rmssd_milli??null,
              rhr:s.resting_heart_rate??null, spo2:s.spo2_percentage??null, skinTemp:s.skin_temp_celsius??null};
    }
    if(kind==='sleep'){
      if('performance' in r || 'efficiency' in r) return r;
      const s=r.score||{}, st=s.stage_summary||{};
      const dur=(st.total_in_bed_time_milli||0)-(st.total_awake_time_milli||0);
      return {date:(r.start||r.created_at||'').slice(0,10), performance:s.sleep_performance_percentage??null,
              efficiency:s.sleep_efficiency_percentage??null, consistency:s.sleep_consistency_percentage??null,
              durationMs:dur, remMs:st.total_rem_sleep_time_milli??null, swsMs:st.total_slow_wave_sleep_time_milli??null,
              lightMs:st.total_light_sleep_time_milli??null, awakeMs:st.total_awake_time_milli??null,
              respRate:s.respiratory_rate??null, disturbances:st.disturbance_count??null, nap:r.nap};
    }
    if(kind==='workouts'){
      if('sport' in r || 'strain' in r) return r;
      const s=r.score||{};
      return {date:(r.start||'').slice(0,10), sport:r.sport_name||'workout', strain:s.strain??null,
              avgHr:s.average_heart_rate??null, maxHr:s.max_heart_rate??null, kilojoule:s.kilojoule??null,
              distanceM:s.distance_meter??null, durationMs:r.start&&r.end?(new Date(r.end)-new Date(r.start)):null};
    }
    if(kind==='cycles'){
      if('strain' in r && !('sport' in r)) return r;
      const s=r.score||{};
      return {date:(r.start||'').slice(0,10), strain:s.strain??null, avgHr:s.average_heart_rate??null,
              maxHr:s.max_heart_rate??null, kilojoule:s.kilojoule??null};
    }
    return r;
  }).filter(r=>r.date);
}

/* ---- live sync via proxy ---- */
async function syncWhoop(){
  const w=whoopDB();
  if(!w.proxyUrl){ toast('Set your proxy URL first'); return; }
  const base=w.proxyUrl.replace(/\/$/,'');
  const days=180;
  toast('Syncing WHOOP…');
  try{
    const fetches=['recovery','sleep','workouts','cycles'].map(k=>
      fetch(`${base}/whoop/${k}?days=${days}`,{headers:{'Accept':'application/json'}})
        .then(async r=>{ if(!r.ok){ let d=''; try{ d=((await r.json())||{}).error||''; }catch(e){} throw new Error(`${k}: HTTP ${r.status}${d?' — '+d:''}`); } return r.json(); })
        .then(j=>({k,data:normalizeWhoop(k,j)})));
    const profileP=fetch(`${base}/whoop/profile`).then(r=>r.ok?r.json():null).catch(()=>null);
    const results=await Promise.all(fetches);
    results.forEach(({k,data})=> w[k]=mergeWhoop(k, w[k]||[], data));
    const prof=await profileP; if(prof) w.profile=prof;
    w.lastSync=new Date().toISOString();
    save(); renderWhoop(); renderHome(); toast('WHOOP synced');
  }catch(err){
    const msg=err.message||'network error';
    window._whoopSyncError = msg;
    if(/auth\/login|token refresh failed|Not authenticated/i.test(msg)){
      whoopReauthModal();
    }else{
      toast('Sync failed — '+msg);
    }
    console.error(err);
    renderWhoop();   // re-render so the error + retry are visible (not just a fleeting toast)
  }
}

// Generic merge keyed by a function. Recovery/sleep/cycles are one-per-day (key = date),
// but there can be MANY workouts in a day — keying those by date alone collapsed them to
// one (so a day's golf+gym+stretch showed only the last, usually stretching). Workouts use
// a composite key so every session survives.
function mergeBy(existing, incoming, keyFn){
  const map={}; (existing||[]).forEach(r=>map[keyFn(r)]=r); (incoming||[]).forEach(r=>map[keyFn(r)]=r);
  return Object.values(map).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}
const dateKey = r=>r.date;
const workoutKey = r=>`${r.date}|${r.sport}|${r.durationMs}|${r.strain}`;
function mergeWhoop(kind, existing, incoming){ return mergeBy(existing, incoming, kind==='workouts'?workoutKey:dateKey); }
// kept for backwards compatibility
function mergeByDate(existing, incoming){ return mergeBy(existing, incoming, dateKey); }

// Pretty sport labels — WHOOP returns codes like "weightlifting_msk"
function sportLabel(s){
  if(!s) return 'Workout';
  const map={ weightlifting_msk:'Weightlifting', weightlifting:'Weightlifting', functional_fitness:'Functional fitness',
    stretching:'Stretching', golf:'Golf', cycling:'Cycling', walking:'Walking', running:'Running', hiking:'Hiking',
    swimming:'Swimming', tennis:'Tennis', pilates:'Pilates', yoga:'Yoga', rowing:'Rowing', elliptical:'Elliptical',
    hiit:'HIIT', boxing:'Boxing', padel:'Padel', meditation:'Meditation', 'spin':'Spin' };
  if(map[s]) return map[s];
  return s.replace(/_msk$/,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

function whoopCoach(rec,slp,strain){
  const bits=[];
  const r7=avgKey(recent(rec,7),'recovery'), r30=avgKey(recent(rec,30),'recovery');
  const hrv7=avgKey(recent(rec,7),'hrv'), hrv30=avgKey(recent(rec,30),'hrv');
  if(r7!=null){
    const band = r7>=67?'green':r7>=34?'yellow':'red';
    bits.push(`Your 7-day recovery is averaging <b>${Math.round(r7)}%</b> — ${band==='green'?'solidly in the green; your body is absorbing the work well':band==='yellow'?'in the yellow, suggesting you\u2019re carrying some fatigue':'running red, a clear signal to back off and prioritise sleep'}.`);
  }
  if(hrv7!=null&&hrv30!=null){
    const d=hrv7-hrv30;
    if(Math.abs(d)>=2) bits.push(`HRV is trending <b>${d>0?'up':'down'}</b> versus your month average — ${d>0?'a good sign of adaptation':'worth watching, often an early marker of accumulated stress or under-recovery'}.`);
  }
  const s7=avgKey(recent(slp,7),'performance');
  if(s7!=null) bits.push(`Sleep performance is averaging <b>${Math.round(s7)}%</b> of need.`);
  bits.push(`At 54, recovery capacity is the lever that lets you keep running and playing golf for decades — these numbers are how you protect it.`);
  return bits.join(' ');
}

/* ---- WHOOP weekly training analysis (workout routine) ---- */
function whoopWeekAgg(workouts, weekOffset){
  const s=tkWeekStart()-weekOffset*7*864e5, e=s+7*864e5;
  const items=(workouts||[]).filter(x=>{ const ts=new Date((x.date||'')+'T00:00:00').getTime(); return ts>=s && ts<e; });
  return {
    count:items.length,
    strain:items.reduce((a,b)=>a+(b.strain||0),0),
    durMs:items.reduce((a,b)=>a+(b.durationMs||0),0),
    distM:items.reduce((a,b)=>a+(b.distanceM||0),0),
    kj:items.reduce((a,b)=>a+(b.kilojoule||0),0),
    items
  };
}
function whoopTraining(w){
  const wk=w.workouts||[];
  if(!wk.length) return '';
  const fmtHM=ms=>{ if(!ms)return'0m'; const h=Math.floor(ms/3600000),m=Math.round((ms%3600000)/60000); return h?`${h}h ${String(m).padStart(2,'0')}m`:`${m}m`; };
  const thisW=whoopWeekAgg(wk,0), lastW=whoopWeekAgg(wk,1);
  const delta=(a,b)=>{ if(!b){ return a>0?`<span style="color:var(--good);font-family:var(--mono);font-size:11px">▲ new vs last wk</span>`:''; }
    const d=Math.round((a-b)/b*100); const col=d>0?'var(--good)':d<0?'var(--bad)':'var(--ink-faint)';
    return `<span style="color:${col};font-family:var(--mono);font-size:11px">${d>0?'▲':d<0?'▼':'■'} ${Math.abs(d)}% vs last wk</span>`; };
  const tiles=[
    {bar:'var(--terra)',lbl:'Sessions',num:thisW.count,sub:delta(thisW.count,lastW.count)},
    {bar:'var(--sage)',lbl:'Total strain',num:thisW.strain.toFixed(1),sub:delta(thisW.strain,lastW.strain)},
    {bar:'var(--sky)',lbl:'Active time',num:fmtHM(thisW.durMs),sub:delta(thisW.durMs,lastW.durMs)},
    {bar:'var(--gold)',lbl:'Distance',num:(thisW.distM/1000).toFixed(1)+'<small> km</small>',sub:delta(thisW.distM,lastW.distM)},
  ];
  const tilesHtml=tiles.map(t=>`<div class="card tile"><div class="accent-bar" style="background:${t.bar}"></div><div class="lbl">${t.lbl}</div><div class="num" style="font-size:28px">${t.num}</div><div class="foot" style="font-style:normal">${t.sub||'&nbsp;'}</div></div>`).join('');
  // last 8 weeks load (total strain)
  const weeks=[]; for(let i=7;i>=0;i--){ const a=whoopWeekAgg(wk,i); weeks.push({label:i===0?'now':i+'w',value:+a.strain.toFixed(1),color:i===0?'var(--terra)':'var(--sage)'}); }
  const loadChart=barChart(weeks,{h:170,yFmt:v=>Math.round(v),labStep:1});
  // sport mix — last 4 weeks by strain share
  const since=tkWeekStart()-3*7*864e5;
  const recent4=wk.filter(x=>new Date((x.date||'')+'T00:00:00').getTime()>=since);
  const bySport={}; recent4.forEach(x=>{ const s=(x.sport||'workout'); (bySport[s]=bySport[s]||{n:0,strain:0}).n++; bySport[s].strain+=x.strain||0; });
  const sports=Object.entries(bySport).sort((a,b)=>b[1].strain-a[1].strain);
  const totS=sports.reduce((a,b)=>a+b[1].strain,0)||1;
  const sportHtml=sports.length? sports.map(([name,v],i)=>{ const pct=v.strain/totS*100; const c=TK_PALETTE[i%TK_PALETTE.length];
    return `<div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;font-family:var(--serif);font-size:13.5px;margin-bottom:5px"><span>${tkEsc(sportLabel(name))}</span><span style="font-family:var(--mono);font-size:11.5px;color:var(--ink-soft)">${v.n}× · ${Math.round(pct)}%</span></div>
      <div class="tk-bar" style="margin:0"><i style="width:${pct}%;background:${c}"></i></div></div>`; }).join('')
    : '<div class="empty">No sessions in the last 4 weeks.</div>';

  return `<div class="card card-pad" style="margin-bottom:22px">
     <div class="kicker">Training</div><div class="h-sec">This week's routine<span class="sub">Mon–Sun, vs last week</span></div>
     <div class="grid g4" style="margin-bottom:20px">${tilesHtml}</div>
     <div class="coach" style="margin-bottom:20px"><div class="q">Coach · routine review</div><p>${whoopRoutineCoach(w,thisW)}</p></div>
     <div class="grid g2">
       <div><div class="kicker" style="margin-bottom:10px">8-week training load · total strain</div>${loadChart}</div>
       <div><div class="kicker" style="margin-bottom:14px">Sport mix · last 4 weeks</div>${sportHtml}</div>
     </div></div>`;
}
function whoopRoutineCoach(w,thisW){
  const wk=w.workouts||[]; const bits=[];
  const last4=[0,1,2,3].map(i=>whoopWeekAgg(wk,i).count); const avg4=last4.reduce((a,b)=>a+b,0)/4;
  if(thisW.count===0) bits.push(`No sessions logged this week yet. At 54 the win is <b>consistency</b> — even two quality sessions defends the fitness you've built.`);
  else if(thisW.count>=avg4) bits.push(`<b>${thisW.count} session${thisW.count>1?'s':''}</b> this week, at or above your 4-week average of ${avg4.toFixed(1)} — consistency is trending the right way.`);
  else bits.push(`<b>${thisW.count} session${thisW.count>1?'s':''}</b> this week vs a 4-week average of ${avg4.toFixed(1)}. Don't let it drift — one more easy session keeps the rhythm intact.`);
  const rec7=avgKey(recent(w.recovery,7),'recovery');
  if(rec7!=null && thisW.count>0){
    const perSession=thisW.strain/thisW.count;
    if(rec7<50 && perSession>14) bits.push(`Recovery is averaging <b>${Math.round(rec7)}%</b> while your sessions are high-strain — that's the overreaching zone. Trade one hard day for zone-2 or mobility this week.`);
    else if(rec7>=67 && perSession<9) bits.push(`Recovery is strong (<b>${Math.round(rec7)}%</b>) but strain is light — your body has room to push one session harder.`);
    else bits.push(`Strain and recovery look balanced (recovery <b>${Math.round(rec7)}%</b>). Keep the hard days hard and the easy days genuinely easy.`);
  }
  const since=tkWeekStart()-3*7*864e5;
  const sportSet=new Set(wk.filter(x=>new Date((x.date||'')+'T00:00:00').getTime()>=since).map(x=>x.sport||'workout'));
  const hasStrength=[...sportSet].some(s=>/strength|weight|gym|functional/i.test(s));
  if(thisW.count>0 && sportSet.size<=1) bits.push(`Your training sits in a single discipline. Adding one <b>strength or mobility</b> session a week is the highest-leverage change for staying durable into your late 50s.`);
  else if(thisW.count>0 && !hasStrength) bits.push(`Good variety — the one gap is <b>resistance work</b>. A weekly strength session is what preserves muscle and bone as you keep running and golfing.`);
  return bits.join(' ');
}

function buildCoachContext(){

  }

  // Recent session log (last 8 entries, most recent first)
  const recentLog=(m.log||[]).slice(-8).reverse();
  if(recentLog.length){
    parts.push('=== RECENT SESSION LOG (newest first) ===\n'+recentLog.map(e=>'['+e.date+'] '+e.text).join('\n\n'));
  }

  // Live data snapshot
  try{
    const w=(DB.whoop||{}); const rec=w.recovery||[], slp=w.sleep||[], wk=w.workouts||[];
    const lastRec=rec[rec.length-1]||{};
    const r7=avgKey(recent(rec,7),'recovery'), s7=avgKey(recent(slp,7),'performance');
    const cfg=morningCfg(); const tasks=(cfg.tasks||[]);
    const openT=tasks.filter(t=>!t.done);
    const today=todayISO(); const overdue=openT.filter(t=>t.due&&t.due<today).length;
    const topTasks=openT.slice().sort(tkSortOpen).slice(0,5).map(t=>t.text);
    const thisW=(typeof whoopWeekAgg==='function')?whoopWeekAgg(wk,0):null;
    const live=[];
    live.push('Today: '+new Date().toDateString()+'.');
    if(lastRec.recovery!=null) live.push('WHOOP recovery today: '+Math.round(lastRec.recovery)+'%'+(r7!=null?' (7-day avg '+Math.round(r7)+'%)':'')+'. HRV: '+(lastRec.hrv!=null?Math.round(lastRec.hrv)+' ms':'—')+'. RHR: '+(lastRec.rhr!=null?Math.round(lastRec.rhr)+' bpm':'—')+'.');
    if(s7!=null) live.push('Sleep performance 7-day avg: '+Math.round(s7)+'%.');
    if(thisW) live.push('Training this week: '+thisW.count+' sessions, strain '+thisW.strain.toFixed(1)+'.');
    if(openT.length) live.push('Tasks: '+openT.length+' open'+(overdue?', '+overdue+' overdue':'')+'.'+(topTasks.length?' Priority: '+topTasks.join('; ').slice(0,200)+'.':''));
    const pf=DB.profFocus;
    if(pf&&(pf.strategic||pf.decision||pf.followup)){

function coachGreeting(){

  const sugg=['How should I train today given my recovery?','Help me prioritise today’s tasks','Am I on track for retirement?','I’m feeling stretched — help me reset'];
  document.getElementById('coachSugg').innerHTML=sugg.map(s=>`<button onclick="coachQuick(this)">${tkEsc(s)}</button>`).join('');
}
function coachQuick(btn){ document.getElementById('coachText').value=btn.textContent; coachSend(); }
function coachContext(){
  try{
    const w=(DB.whoop||{}); const rec=w.recovery||[], slp=w.sleep||[], wk=w.workouts||[];
    const lastRec=rec[rec.length-1]||{};
    const r7=avgKey(recent(rec,7),'recovery'), s7=avgKey(recent(slp,7),'performance');
    const m=morningCfg(); const tasks=(m.tasks||[]); const openT=tasks.filter(t=>!t.done);
    const today=todayISO(); const overdue=openT.filter(t=>t.due&&t.due<today).length;
    const topTasks=openT.slice().sort(tkSortOpen).slice(0,6).map(t=>t.text);
    const thisW=(typeof whoopWeekAgg==='function')?whoopWeekAgg(wk,0):null;
    const L=[];
    L.push(`Today is ${new Date().toDateString()}.`);
    if(lastRec.recovery!=null) L.push(`WHOOP recovery today ${Math.round(lastRec.recovery)}%${r7!=null?` (7-day avg ${Math.round(r7)}%)`:''}.`);
    if(lastRec.hrv!=null) L.push(`HRV ${Math.round(lastRec.hrv)}ms, resting HR ${lastRec.rhr??'—'}bpm.`);
    if(s7!=null) L.push(`Sleep performance 7-day avg ${Math.round(s7)}%.`);
    if(thisW) L.push(`Training this week ${thisW.count} sessions, total strain ${thisW.strain.toFixed(1)}.`);
    L.push(`Tasks ${openT.length} open${overdue?`, ${overdue} overdue`:''}.${topTasks.length?` Top: ${topTasks.join('; ')}.`:''}`);
    try{ const nw=netWorth(); if(nw) L.push(`Net worth approx ${ZARk(nw)}.`); }catch(e){}
    L.push(`Context: Stuart, 54, Cape Town; runs and plays golf; values longevity and a comfortable retirement.`);
    return L.join(' ');
  }catch(e){ return ''; }
}
async function coachSend(){
  const t=document.getElementById('coachText'); const text=(t.value||'').trim();
  if(!text||_coachBusy) return;
  const base=proxyBase();
  coachPush('user',text); _coachHistory.push({role:'user',content:text});
  t.value=''; coachAutogrow(t); document.getElementById('coachSugg').innerHTML='';
  if(!base){ coachPush('bot','I need your proxy connected to reach Claude. Open the WHOOP tab → Settings, set your proxy URL, then try again.'); return; }
  _coachBusy=true; const send=document.getElementById('coachSend'); send.disabled=true;
  const box=document.getElementById('coachMsgs');
  const typing=document.createElement('div'); typing.className='cm-typing'; typing.textContent='Coach is thinking…'; box.appendChild(typing); box.scrollTop=box.scrollHeight;
  try{
    const r=await fetch(base+'/coach',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:_coachHistory.slice(-12), context:coachContext()})});
    let j={}; try{ j=await r.json(); }catch(e){}
    typing.remove();
    if(!r.ok||j.error){ coachPush('bot', j.error?('Coach unavailable: '+j.error):'Coach is unavailable right now. Make sure ANTHROPIC_API_KEY is set on the proxy.'); }
    else { const reply=j.reply||'(no reply)'; coachPush('bot',reply); _coachHistory.push({role:'assistant',content:reply}); }
  }catch(e){ typing.remove(); coachPush('bot','Could not reach the coach (network). Try again in a moment.'); }
  _coachBusy=false; send.disabled=false;
  setTimeout(()=>{const el=document.getElementById('coachText'); if(el)el.focus();},50);
}

/* ============================================================
   GOALS — structured goals behind a screen-privacy password gate.
   NOTE: this is screen-privacy (deters over-the-shoulder viewing),
   not encryption — data still lives in the browser like the rest.
   ============================================================ */
const GOAL_CATS={Health:'var(--good)',Wealth:'var(--gold)',Career:'var(--terra)',Personal:'var(--sage)',Relationships:'var(--rose)',Adventure:'var(--sky)'};
function goalsCfg(){ DB.goals=DB.goals||{pwHash:null,items:[]}; if(!Array.isArray(DB.goals.items))DB.goals.items=[]; return DB.goals; }
function goalsHash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return 'h'+(h>>>0); }
function lockSvg(){ return '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg>'; }
let _goalsUnlocked=false;
function renderGoals(){
  const g=goalsCfg(); const P=document.getElementById('pane-goals'); if(!P)return;
  if(!g.pwHash){
    P.innerHTML=`<div class="lock-wrap"><div class="lock-card"><div class="lock-ic">${lockSvg()}</div>
      <h2>Protect your goals</h2><p>Set a password to keep this section private on shared screens.</p>
      <input id="g_set1" type="password" placeholder="Choose a password" onkeydown="if(event.key==='Enter')document.getElementById('g_set2').focus()">
      <input id="g_set2" type="password" placeholder="Confirm password" onkeydown="if(event.key==='Enter')setGoalsPw()">
      <button class="btn primary" style="width:100%;justify-content:center" onclick="setGoalsPw()">Set password</button>
      <div class="lock-note">Screen-privacy only — not encryption.</div></div></div>`;
    return;
  }
  if(!_goalsUnlocked){
    P.innerHTML=`<div class="lock-wrap"><div class="lock-card"><div class="lock-ic">${lockSvg()}</div>
      <h2>Goals locked</h2><p>Enter your password to view your goals.</p>
      <input id="g_pw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')unlockGoals()">
      <button class="btn primary" style="width:100%;justify-content:center" onclick="unlockGoals()">Unlock</button>
      <div class="lock-note">Screen-privacy only — not encryption.</div></div></div>`;
    setTimeout(()=>{const el=document.getElementById('g_pw');if(el)el.focus();},200);
    return;
  }
  const items=g.items.slice().sort((a,b)=>(a.progress||0)-(b.progress||0));
  const active=items.filter(x=>(x.progress||0)<100), done=items.filter(x=>(x.progress||0)>=100);
  const card=x=>{ const c=GOAL_CATS[x.category]||'var(--ink-faint)';
    return `<div class="goal-card">
      <span class="goal-cat" style="background:${c}22;color:${c}">${tkEsc(x.category||'Goal')}</span>
      <div class="goal-title">${tkEsc(x.title)}</div>
      <div class="goal-meta">${x.target?('Target '+tkEsc(x.target)):'No target date'}</div>
      <div class="goal-bar"><i style="width:${x.progress||0}%;background:${c}"></i></div>
      <div class="goal-meta" style="display:flex;justify-content:space-between"><span>${x.progress||0}% complete</span>${(x.progress||0)>=100?'<span style="color:var(--good)">Achieved ✓</span>':''}</div>
      ${x.notes?`<div class="goal-notes">${tkEsc(x.notes)}</div>`:''}
      <div class="goal-actions"><a onclick="editGoal('${x.id}')">Edit</a><a onclick="delGoal('${x.id}')">Delete</a></div></div>`; };
  P.innerHTML=`<div class="coach"><div class="q">Your goals</div><p>${goalsCoach(items)}</p></div>
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
      <button class="btn primary" onclick="addGoal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New goal</button>
      <button class="btn" onclick="lockGoals()">${lockSvg().replace('width="26" height="26"','width="15" height="15"')}Lock</button>
      <span style="font-family:var(--serif);font-style:italic;color:var(--ink-faint);font-size:13px;margin-left:auto">${active.length} active · ${done.length} achieved</span></div>
    ${items.length? `<div class="grid g3">${active.map(card).join('')}${done.map(card).join('')}</div>` : '<div class="empty" style="padding:46px">No goals yet — add your first above.</div>'}`;
}
function setGoalsPw(){ const a=document.getElementById('g_set1').value, b=document.getElementById('g_set2').value;
  if(!a||a.length<3){toast('Use at least 3 characters');return;} if(a!==b){toast("Passwords don't match");return;}
  goalsCfg().pwHash=goalsHash(a); _goalsUnlocked=true; save(); renderGoals(); toast('Goals protected'); }
function unlockGoals(){ const v=document.getElementById('g_pw').value||''; if(goalsHash(v)===goalsCfg().pwHash){ _goalsUnlocked=true; renderGoals(); } else toast('Wrong password'); }
function lockGoals(){ _goalsUnlocked=false; renderGoals(); }
function goalsCoach(items){
  if(!items.length) return `Goals turn intention into progress. Add three you want to move this quarter — specific and time-bound.`;
  const avg=Math.round(items.reduce((s,x)=>s+(x.progress||0),0)/items.length);
  const done=items.filter(x=>(x.progress||0)>=100).length;
  return `You're tracking <b>${items.length}</b> goal${items.length>1?'s':''}, averaging <b>${avg}%</b>${done?`, with ${done} achieved`:''}. Pick the one that matters most this week and give it a concrete next action.`;
}
function addGoal(){ goalModal(null); }
function editGoal(id){ goalModal(id); }
function goalModal(id){
  const g=goalsCfg(); const x=id?g.items.find(i=>i.id===id):null;
  const cats=Object.keys(GOAL_CATS).map(c=>`<option ${x&&x.category===c?'selected':''}>${c}</option>`).join('');
  showModal(`<div class="modal-head"><div><h2>${x?'Edit goal':'New goal'}</h2><div class="ms">Make it specific and time-bound</div></div><button class="x" onclick="closeModal()">${xSvg()}</button></div>
    <div class="modal-body">
      <div class="field"><label>Goal</label><input id="gm_title" value="${x?tkEsc(x.title):''}" placeholder="e.g. Run a sub-4:30 marathon"></div>
      <div class="row2">
        <div class="field"><label>Category</label><select id="gm_cat">${cats}</select></div>
        <div class="field"><label>Target month</label><input id="gm_target" type="month" value="${x&&x.target?x.target:''}"></div></div>
      <div class="field"><label>Progress — <b id="gm_pl">${x?(x.progress||0):0}</b>%</label>
        <input id="gm_prog" type="range" min="0" max="100" value="${x?(x.progress||0):0}" oninput="document.getElementById('gm_pl').textContent=this.value"></div>
      <div class="field"><label>Notes</label><textarea id="gm_notes" style="width:100%;min-height:90px;background:var(--paper);border:1px solid var(--line2);border-radius:10px;padding:11px;font-family:var(--serif);font-size:14px;color:var(--ink)">${x?tkEsc(x.notes||''):''}</textarea></div>
      <div style="display:flex;gap:10px"><button class="btn primary" onclick="saveGoal(${id?`'${id}'`:'null'})">Save</button>${x?`<button class="btn" onclick="delGoal('${id}');closeModal()">Delete</button>`:''}</div></div>`);
}
function saveGoal(id){
  const g=goalsCfg(); const title=document.getElementById('gm_title').value.trim(); if(!title){toast('Enter a goal');return;}
  const obj={ title, category:document.getElementById('gm_cat').value, target:document.getElementById('gm_target').value||'', progress:+document.getElementById('gm_prog').value||0, notes:document.getElementById('gm_notes').value.trim() };
  if(id){ const x=g.items.find(i=>i.id===id); if(x)Object.assign(x,obj); } else { obj.id='g'+Date.now(); obj.createdAt=Date.now(); g.items.push(obj); }
  save(); closeModal(); renderGoals();
}
function delGoal(id){ const g=goalsCfg(); g.items=g.items.filter(i=>i.id!==id); save(); renderGoals(); }

function heroHome(){

  const greet=(hour<12?'Good morning':hour<18?'Good afternoon':'Good evening')+', Stuart';
  const dateline=new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
  const w=DB.whoop||{}; const rec=(w.recovery||[]); const lastRec=rec[rec.length-1];
  const slp=(w.sleep||[]); const lastSlp=slp[slp.length-1];
  const recV=lastRec&&lastRec.recovery!=null?Math.round(lastRec.recovery):null;
  const slpV=lastSlp&&lastSlp.performance!=null?Math.round(lastSlp.performance):null;
  const slpH=lastSlp&&lastSlp.durationMs?fmtDur(lastSlp.durationMs):null;
  const wk=(w.workouts||[]); const sess=(typeof whoopWeekAgg==='function')?whoopWeekAgg(wk,0).count:0;
  const openT=(morningCfg().tasks||[]).filter(t=>!t.done).length;
  const overdue=(morningCfg().tasks||[]).filter(t=>!t.done&&t.due&&t.due<todayISO()).length;

  const recColor=recV==null?'rgba(255,255,255,.6)':recV>=67?'#6ee7b7':recV>=34?'#fcd34d':'#fca5a5';

        ${weatherChip()}

      <div class="hero-stat">
        <div class="v" style="color:${recColor}">${recV!=null?recV+'%':'—'}</div>

        <div style="font-family:var(--serif);font-size:11px;margin-top:3px;opacity:.75">${recLabel}</div>

        <div class="l">Sleep</div>
