// z-score sparkline in platform colours
function pSpark(zhist,w=120,h=34){
  if(!zhist||zhist.length<2) return '';
  const min=-3,max=3,n=zhist.length;
  const x=i=>(i/(n-1))*w, y=v=>h-((v-min)/(max-min))*h;
  let d=''; zhist.forEach((v,i)=>{d+=(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)+' ';});
  const last=zhist[n-1], col=Math.abs(last)>1.5?(last<0?'var(--good)':'var(--sky)'):'var(--ink-faint)';
  return `<svg width="${w}" height="${h}" style="display:block">
    <line x1="0" y1="${y(1.5)}" x2="${w}" y2="${y(1.5)}" stroke="var(--line2)" stroke-dasharray="2 3"/>
    <line x1="0" y1="${y(-1.5)}" x2="${w}" y2="${y(-1.5)}" stroke="var(--line2)" stroke-dasharray="2 3"/>
    <line x1="0" y1="${y(0)}" x2="${w}" y2="${y(0)}" stroke="var(--line2)" opacity="0.5"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="1.6"/>
    <circle cx="${x(n-1)}" cy="${y(last)}" r="2.6" fill="${col}"/></svg>`;
}
function pEquity(trades,w=380,h=150){
  if(!trades||!trades.length) return '';
  const eq=[1,...trades.map(t=>t.eq)];
  const pad=26, min=Math.min(...eq,1)*0.98, max=Math.max(...eq)*1.02;
  const x=i=>pad+(i/(eq.length-1))*(w-pad-6), y=v=>8+(1-(v-min)/(max-min))*(h-8-18);
  let s='';
  for(let t=0;t<=3;t++){const v=min+(max-min)*t/3,yy=y(v);
    s+=`<line x1="${pad}" y1="${yy}" x2="${w-6}" y2="${yy}" stroke="var(--line)"/>`;
    s+=`<text x="2" y="${yy+3}" font-size="9" fill="var(--ink-faint)" font-family="var(--mono)">${v.toFixed(2)}x</text>`;}
  s+=`<line x1="${pad}" y1="${y(1)}" x2="${w-6}" y2="${y(1)}" stroke="var(--ink-faint)" stroke-dasharray="2 4"/>`;
  let d=''; eq.forEach((v,i)=>{d+=(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)+' ';});
  const up=eq[eq.length-1]>=1;
  s+=`<path d="${d}" fill="none" stroke="${up?'var(--good)':'var(--bad)'}" stroke-width="2"/>`;
  s+=`<circle cx="${x(eq.length-1)}" cy="${y(eq[eq.length-1])}" r="3.5" fill="${up?'var(--good)':'var(--bad)'}"/>`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" style="width:100%">${s}</svg>`;
}

}

function pairsMethodHtml(){
  return `<div class="card card-pad" style="margin-bottom:16px">
    <div class="kicker">How it works</div><div class="h-sec">The engine</div>
    <div style="font-family:var(--serif);font-size:14px;color:var(--ink-soft);line-height:1.7">
      <p style="margin-bottom:12px">For each structurally-linked pair (same sector, shared commodity, or parent/subsidiary), the tool takes the <b style="color:var(--ink)">log price ratio</b> and measures how far it sits from its own 6-month average, in standard deviations — a <b style="color:var(--ink)">z-score</b>.</p>
      <p style="margin-bottom:12px"><b style="color:var(--ink)">Entry:</b> when |z| &gt; 1.5 (spread stretched two-thirds of the way to its historical extreme). <b style="color:var(--ink)">Exit:</b> when z reverts through zero — the mispricing has closed — or a 90-day cap, whichever comes first.</p>
      <p style="margin-bottom:12px"><b style="color:var(--ink)">Why the exit matters:</b> an early version held a fixed 63 days and barely beat cash. Exiting on reversion instead of a calendar lifted most pairs from single-digit to ~15-19% CAGR.</p>
      <p><b style="color:var(--ink)">Costs:</b> 25bps per leg per side (100bps round-trip for a two-leg pair). At a 24-66 day hold these are trivial against the moves.</p>
    </div>
  </div>
  <div class="card card-pad" style="border-left:3px solid var(--bad)">
    <div class="kicker" style="color:var(--bad)">Read before trading</div><div class="h-sec">Honest caveats</div>

      <p style="margin-bottom:12px"><b style="color:var(--ink)">Small samples.</b> Most pairs have 8-19 trades over 5 years. High win rates over few trades are promising, not proven.</p>
      <p style="margin-bottom:12px"><b style="color:var(--ink)">Shorting.</b> Non-commodity pairs need you to short one leg — check borrow availability and cost. Commodity-leg pairs can't be shorted retail, so the practical trade is the single stock when it's cheap.</p>

      <div><div class="kicker">JSE mean-reversion</div><div class="h-sec" style="margin-bottom:0">Pairs — live picks</div></div>

        :`<div style="font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-faint);padding:6px 0">No pairs are live (|z|&gt;1.5) right now — watching the closest below.</div>`}
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);margin:10px 0 2px">Closest to trigger</div>
      ${watchHtml}

/* ============================================================
   SCENARIO PLANNER — AI-impact forecast, personal vs Gerber.
   Toggles context, runs an on-demand deep dive on the proxy, and
   shows LOW/MEDIUM/HIGH scenarios with the top-5 outcomes at
   1 / 2.5 / 5 year horizons. Decision-support, not certainty.
   ============================================================ */
let _scenCtx='personal';        // 'personal' | 'gerber'
let _scenBand='medium';         // 'low' | 'medium' | 'high'
let _scenHorizon='1';           // '1' | '2.5' | '5'
let _scenData={ personal:null, gerber:null };
let _scenWhen={ personal:null, gerber:null };
let _scenRunning=false;
let _scenProfiles=null;
let _scenKicked={ personal:false, gerber:false };

async function loadScenario(ctx){
  const base=proxyBase(); if(!base) return;
  try{ const r=await fetch(base+'/scenario?ctx='+ctx+'&_='+Date.now()); if(!r.ok)return; const j=await r.json();
    if(j && j.scenarios){ _scenData[ctx]=j.scenarios; _scenWhen[ctx]=j.updatedAt; renderScenario(); }
  }catch(e){}
}
async function runScenarioNow(){
  const base=proxyBase(); if(!base){ toast('Connect your proxy first.'); return; }
  if(_scenRunning){ toast('A forecast is already running — please wait.'); return; }
  _scenRunning=true; renderScenario();
  toast('Generating AI-impact forecast…');
  try{
    const r=await fetch(base+'/scenario/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ctx:_scenCtx})});
    const j=await r.json().catch(()=>({}));
    if(j.scenarios){ _scenData[_scenCtx]=j.scenarios; _scenWhen[_scenCtx]=j.updatedAt; _scenRunning=false; renderScenario(); toast('Forecast ready.'); return; }
    if(j.error) throw new Error(j.error);
    // Background job started — poll until done
    pollScenario(0);
  }catch(e){
    _scenRunning=false; renderScenario();
    toast('Failed: '+(e.message||'try again'));
  }
}
function pollScenario(n){
  if(n>24) return (_scenRunning=false, renderScenario(), toast('Forecast timed out — try again.'));
  const base=proxyBase(); if(!base) return;
  setTimeout(async()=>{
    try{
      const r=await fetch(base+'/scenario/status?ctx='+_scenCtx+'&_='+Date.now());
      const d=await r.json().catch(()=>({}));
      if(d.scenarios){ _scenData[_scenCtx]=d.scenarios; _scenWhen[_scenCtx]=d.updatedAt; _scenRunning=false; renderScenario(); toast('Forecast ready.'); }
      else if(d.running){ pollScenario(n+1); }
      else { _scenRunning=false; renderScenario(); toast('Forecast failed on the server — try again.'); }
    }catch(e){ pollScenario(n+1); }
  }, n===0 ? 12000 : 5000);
}
function scenSetCtx(c){ _scenCtx=c; renderScenario(); if(!_scenData[c]) loadScenario(c); }
function scenSetBand(b){ _scenBand=b; renderScenario(); }
function scenSetHorizon(h){ _scenHorizon=h; renderScenario(); }

    body=`
